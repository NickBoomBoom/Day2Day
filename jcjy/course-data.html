    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&family=Varela+Round&display=swap");

      :root {
        --bg: #fffaf8;
        --panel: #ffffff;
        --panel-soft: #fff6f1;
        --ink: #1f2330;
        --muted: #7a8094;
        --line: #eadfd7;
        --line-strong: #efc7b1;
        --accent: rgb(250, 112, 46);
        --accent-deep: #b84b1a;
        --accent-soft: #fff1e8;
        --accent-softer: #fff8f4;
        --accent-ring: rgba(250, 112, 46, 0.14);
        --shadow: 0 18px 40px -36px rgba(31, 35, 48, 0.28);
        --radius: 8px;
        --body-font:
          "Nunito Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        --display-font:
          "Varela Round", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      html {
        color-scheme: light;
        font-family: var(--body-font);
        color: var(--ink);
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(250, 112, 46, 0.08), transparent 28%),
          linear-gradient(180deg, #fffefc 0%, var(--bg) 100%);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      #app {
        width: min(100%, 1520px);
        margin: 0 auto;
        padding: 10px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .boot-state,
      .boot-error {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 20px);
        padding: 24px;
        text-align: center;
      }

      .boot-state p,
      .boot-error p {
        max-width: 520px;
        font-size: 14px;
        line-height: 1.7;
        color: var(--muted);
      }

      .skillmap-page {
        display: grid;
        gap: 18px;
      }

      .hero-card {
        display: grid;
        gap: 18px;
        padding: 24px;
      }

      .hero-copy {
        display: grid;
        gap: 10px;
      }

      .hero-eyebrow {
        font-size: 12px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-deep);
      }

      .hero-title {
        font-family: var(--display-font);
        font-size: clamp(32px, 4vw, 54px);
        line-height: 1.04;
        letter-spacing: -0.05em;
        color: var(--ink);
      }

      .hero-summary {
        max-width: 860px;
        font-size: 15px;
        line-height: 1.8;
        color: var(--muted);
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-stat {
        display: grid;
        gap: 4px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--accent-softer);
      }

      .hero-stat-value {
        font-size: clamp(24px, 2.6vw, 34px);
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--ink);
      }

      .hero-stat-label {
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(380px, 440px);
        gap: 18px;
        align-items: start;
      }

      .graph-card,
      .side-card {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .card-head {
        display: grid;
        gap: 6px;
      }

      .card-head-inline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card-head-main {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .card-title {
        font-family: var(--display-font);
        font-size: clamp(22px, 2vw, 30px);
        line-height: 1.08;
        letter-spacing: -0.04em;
        color: var(--ink);
      }

      .card-copy {
        font-size: 13px;
        line-height: 1.7;
        color: var(--muted);
      }

      .chart-shell {
        display: grid;
        align-items: stretch;
        min-height: 280px;
        padding: 10px;
        border: 1px solid #f1e7e0;
        border-radius: var(--radius);
        background: linear-gradient(180deg, #fffdfb 0%, var(--accent-softer) 100%);
      }

      .chart-shell-lg {
        min-height: 780px;
      }

      .chart-component {
        width: 100%;
        min-height: 100%;
      }

      .chart-empty {
        display: grid;
        place-items: center;
        min-height: 240px;
        padding: 24px;
        text-align: center;
        font-size: 14px;
        line-height: 1.7;
        color: var(--muted);
      }

      .side-stack {
        position: sticky;
        top: 10px;
        display: grid;
        gap: 14px;
      }

      .current-view-card {
        background: var(--accent-softer);
      }

      .current-view-copy {
        font-size: 13px;
        line-height: 1.7;
        color: var(--muted);
      }

      .current-view-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .current-view-stat {
        display: grid;
        gap: 4px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
      }

      .current-view-stat-value {
        font-size: 22px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--ink);
      }

      .current-view-stat-label {
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
      }

      .reset-button {
        min-height: 34px;
        padding: 6px 12px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background: var(--panel);
        color: var(--accent-deep);
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          box-shadow 180ms ease;
      }

      .reset-button:hover,
      .reset-button:focus-visible {
        border-color: var(--accent);
        background: #ffffff;
        outline: none;
        box-shadow: 0 0 0 4px var(--accent-ring);
      }

      .panel-badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .panel-badge {
        min-height: 28px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        font-size: 12px;
        line-height: 1.1;
        color: var(--muted);
      }

      .panel-badge.is-accent {
        border-color: rgba(250, 112, 46, 0.35);
        background: rgba(250, 112, 46, 0.08);
        color: var(--accent-deep);
      }

      @media (max-width: 1180px) {
        .content-grid {
          grid-template-columns: minmax(0, 1fr);
        }

        .side-stack {
          position: static;
        }
      }

      @media (max-width: 760px) {
        #app {
          padding: 12px;
        }

        .hero-card {
          padding: 18px;
        }

        .hero-stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .chart-shell-lg {
          min-height: 560px;
        }

        .current-view-grid {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>

      const KNOWLEDGE_POINT_TYPES = new Set([1, 10000]);
      const SKILL_POINT_TYPES = new Set([2, 10001]);

      const appRoot = document.getElementById("app");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderBootError(message) {
        appRoot.innerHTML = `
          <div class="boot-error card">
            <p>${escapeHtml(message)}</p>
          </div>
        `;
      }

      function getSkillKey(skill) {
        if (!skill) {
          return "";
        }
        return skill.id != null ? String(skill.id) : skill.name || "";
      }

      function getIndustryJobPosition(industry) {
        return industry?.jobPosition || "未绑定岗位";
      }

      function getSelectedSkillKey(skillId, jobPosition) {
        if (skillId == null || skillId === "") {
          return "";
        }
        return `${jobPosition || "未绑定岗位"}::${String(skillId)}`;
      }

      function normalizeFilter(filter = {}) {
        const jobPositions = new Set();
        const skillMap = new Map();

        const appendJobPosition = (jobPosition) => {
          if (!jobPosition) {
            return;
          }
          jobPositions.add(jobPosition);
        };

        const appendSkill = (skillLike, fallbackJobPosition) => {
          if (!skillLike) {
            return;
          }

          const skillId =
            skillLike.id != null
              ? String(skillLike.id)
              : skillLike.skillId != null
                ? String(skillLike.skillId)
                : "";

          if (!skillId) {
            return;
          }

          const jobPosition =
            skillLike.jobPosition || fallbackJobPosition || "未绑定岗位";
          const key = getSelectedSkillKey(skillId, jobPosition);
          if (skillMap.has(key)) {
            return;
          }

          skillMap.set(key, {
            id: skillId,
            name: skillLike.name || skillLike.skillName || "",
            jobPosition,
          });
        };

        if (Array.isArray(filter.jobPositions)) {
          filter.jobPositions.forEach(appendJobPosition);
        } else if (filter.jobPosition) {
          appendJobPosition(filter.jobPosition);
        }

        if (Array.isArray(filter.skills)) {
          filter.skills.forEach((skill) => appendSkill(skill));
        }

        return {
          jobPositions: Array.from(jobPositions.values()),
          skills: Array.from(skillMap.values()),
        };
      }

      function hasActiveFilter(filter = {}) {
        return Boolean(
          (filter.jobPositions || []).length || (filter.skills || []).length,
        );
      }

      function getDirectJobSelectionSet(filter = {}) {
        return new Set(filter.jobPositions || []);
      }

      function getSelectedSkillSet(filter = {}) {
        return new Set(
          (filter.skills || []).map((skill) =>
            getSelectedSkillKey(skill.id, skill.jobPosition),
          ),
        );
      }

      function getActiveJobSelectionSet(filter = {}) {
        const jobPositions = getDirectJobSelectionSet(filter);
        (filter.skills || []).forEach((skill) => {
          if (skill?.jobPosition) {
            jobPositions.add(skill.jobPosition);
          }
        });
        return jobPositions;
      }

      function isExactAbilitySelected(skillId, jobPosition, filter = {}) {
        return getSelectedSkillSet(filter).has(
          getSelectedSkillKey(skillId, jobPosition),
        );
      }

      function dedupeIndustries(skills = []) {
        const industryMap = new Map();

        for (const skill of skills) {
          for (const industry of skill?.industries || []) {
            const key =
              industry.jobPosition ||
              `${industry.industryLevel1}-${industry.industryLevel2}`;
            if (!industryMap.has(key)) {
              industryMap.set(key, industry);
            }
          }
        }

        return Array.from(industryMap.values());
      }

      function dedupeSkills(skills = []) {
        const skillMap = new Map();

        for (const skill of skills) {
          if (!skill) {
            continue;
          }
          const key = getSkillKey(skill);
          if (!skillMap.has(key)) {
            skillMap.set(key, skill);
          }
        }

        return Array.from(skillMap.values());
      }

      function getSkillJobPositions(skill) {
        const industries = dedupeIndustries([skill]);
        return industries.length
          ? industries.map((industry) => getIndustryJobPosition(industry))
          : ["未绑定岗位"];
      }

      function getResourceTitle(item) {
        return item.problem?.title || item.teachingModule?.name || "未命名任务";
      }

      function getPointGroups(item) {
        const knowledgePoints = [];
        const skillPoints = [];
        const allPoints = [];
        const seen = new Set();

        (item.problem?.teachingModules || []).forEach((module) => {
          if (!module?.name) {
            return;
          }

          const key = module.id != null ? String(module.id) : module.name;
          if (seen.has(key)) {
            return;
          }

          seen.add(key);
          allPoints.push(module.name);

          if (SKILL_POINT_TYPES.has(module.type)) {
            skillPoints.push(module.name);
            return;
          }

          if (KNOWLEDGE_POINT_TYPES.has(module.type) || module.type == null) {
            knowledgePoints.push(module.name);
            return;
          }

          knowledgePoints.push(module.name);
        });

        return {
          knowledgePoints,
          skillPoints,
          allPoints,
        };
      }

      function getIndustryPath(industryLevel1, industryLevel2) {
        return [industryLevel1, industryLevel2].filter(Boolean).join("/");
      }

      function getTaskKey(row, item, itemIndex) {
        const projectKey =
          row.testPaper?.syncKey || row.testPaper?.id || row.testPaper?.name || "project";
        const taskKey =
          item.id != null
            ? String(item.id)
            : `${item.problemId || item.teachingModuleId || itemIndex}_${getResourceTitle(item)}`;
        return `${projectKey}::${taskKey}`;
      }

      function itemMatchesFilter(item, filter = {}) {
        if (!hasActiveFilter(filter)) {
          return true;
        }

        const selectedJobs = getDirectJobSelectionSet(filter);
        const selectedSkillKeys = getSelectedSkillSet(filter);

        return (item.skills || []).some((skill) => {
          const jobPositions = getSkillJobPositions(skill);
          const matchedJob = jobPositions.some((jobPosition) =>
            selectedJobs.has(jobPosition),
          );
          const matchedSkill = jobPositions.some((jobPosition) =>
            selectedSkillKeys.has(
              getSelectedSkillKey(getSkillKey(skill), jobPosition),
            ),
          );

          return matchedJob || matchedSkill;
        });
      }

      function filterRows(rows, filter = {}) {
        if (!hasActiveFilter(filter)) {
          return rows.map((row, index) => ({
            ...row,
            sourceIndex: index,
          }));
        }

        return rows
          .map((row, index) => {
            const matchedProblems = (row.testPaperProblems || []).filter((item) =>
              itemMatchesFilter(item, filter),
            );

            if (!matchedProblems.length) {
              return null;
            }

            return {
              ...row,
              testPaperProblems: matchedProblems,
              sourceIndex: index,
            };
          })
          .filter(Boolean);
      }

      function collectRoleBuckets(rows = []) {
        const roleMap = new Map();

        rows.forEach((row) => {
          (row.testPaperProblems || []).forEach((item, itemIndex) => {
            const taskKey = getTaskKey(row, item, itemIndex);
            dedupeSkills(item.skills || []).forEach((skill) => {
              const skillId = getSkillKey(skill);
              const skillName = skill.name || "未命名职业能力";
              const industries = skill.industries?.length
                ? skill.industries
                : [{ jobPosition: "未绑定岗位" }];
              const seenJobs = new Set();

              industries.forEach((industry) => {
                const jobPosition = getIndustryJobPosition(industry);
                if (seenJobs.has(jobPosition)) {
                  return;
                }
                seenJobs.add(jobPosition);

                if (!roleMap.has(jobPosition)) {
                  roleMap.set(jobPosition, {
                    jobPosition,
                    taskIds: new Set(),
                    industryPaths: new Set(),
                    skills: new Map(),
                  });
                }

                const entry = roleMap.get(jobPosition);
                entry.taskIds.add(taskKey);
                const industryPath = getIndustryPath(
                  industry.industryLevel1,
                  industry.industryLevel2,
                );
                if (industryPath) {
                  entry.industryPaths.add(industryPath);
                }

                const childKey = skillId || skillName;
                if (!entry.skills.has(childKey)) {
                  entry.skills.set(childKey, {
                    id: skillId,
                    name: skillName,
                    jobPosition,
                    taskIds: new Set(),
                  });
                }
                entry.skills.get(childKey).taskIds.add(taskKey);
              });
            });
          });
        });

        return Array.from(roleMap.values())
          .map((entry) => ({
            jobPosition: entry.jobPosition,
            industryPaths: Array.from(entry.industryPaths.values()),
            taskCount: entry.taskIds.size,
            skills: Array.from(entry.skills.values())
              .map((skill) => ({
                id: skill.id,
                name: skill.name,
                jobPosition: skill.jobPosition,
                taskCount: skill.taskIds.size,
              }))
              .sort(
                (a, b) =>
                  b.taskCount - a.taskCount ||
                  a.name.localeCompare(b.name, "zh-Hans-CN"),
              ),
          }))
          .sort(
            (a, b) =>
              b.taskCount - a.taskCount ||
              a.jobPosition.localeCompare(b.jobPosition, "zh-Hans-CN"),
          );
      }

      function collectAbilityBuckets(rows = []) {
        const abilityMap = new Map();

        rows.forEach((row) => {
          (row.testPaperProblems || []).forEach((item, itemIndex) => {
            const taskKey = getTaskKey(row, item, itemIndex);
            dedupeSkills(item.skills || []).forEach((skill) => {
              const skillName = skill.name || "未命名职业能力";
              const skillId = getSkillKey(skill);
              const key = skillName || skillId;

              if (!abilityMap.has(key)) {
                abilityMap.set(key, {
                  name: skillName,
                  taskIds: new Set(),
                  selections: new Map(),
                });
              }

              const entry = abilityMap.get(key);
              entry.taskIds.add(taskKey);
              getSkillJobPositions(skill).forEach((jobPosition) => {
                const selectionKey = getSelectedSkillKey(skillId, jobPosition);
                if (!selectionKey) {
                  return;
                }
                entry.selections.set(selectionKey, {
                  id: skillId,
                  name: skillName,
                  jobPosition,
                });
              });
            });
          });
        });

        return Array.from(abilityMap.values())
          .map((entry) => ({
            name: entry.name,
            taskCount: entry.taskIds.size,
            selections: Array.from(entry.selections.values()),
          }))
          .sort(
            (a, b) =>
              b.taskCount - a.taskCount ||
              a.name.localeCompare(b.name, "zh-Hans-CN"),
          );
      }

      function collectCourseMetrics(rows = []) {
        const pointSet = new Set();
        let itemCount = 0;

        rows.forEach((row) => {
          (row.testPaperProblems || []).forEach((item) => {
            itemCount += 1;
            getPointGroups(item).allPoints.forEach((point) => {
              if (point) {
                pointSet.add(point);
              }
            });
          });
        });

        return {
          unitCount: rows.length,
          itemCount,
          knowledgePoints: Array.from(pointSet.values()),
          roleCount: collectRoleBuckets(rows).length,
        };
      }

      function compactDisplayLabel(value, maxLength = 8) {
        const source = String(value || "").trim().replace(/\s+/g, " ");
        if (!source) {
          return "";
        }

        const normalized = source
          .replace(/^项目\d+\s*/u, "")
          .replace(/^任务\d+[:：]?\s*/u, "")
          .replace(/Function Calling/giu, "FC")
          .replace(/Prompt/giu, "Prompt")
          .replace(/Agent/giu, "Agent")
          .trim();

        const chars = Array.from(normalized);
        if (chars.length <= maxLength) {
          return normalized;
        }

        return `${chars.slice(0, maxLength).join("")}…`;
      }

      function createCloudDataset(entries = [], getName, getValue, maxLength = 8) {
        const used = new Map();

        return entries.map((entry) => {
          const fullName = getName(entry);
          const baseName = compactDisplayLabel(fullName, maxLength) || fullName;
          const seen = used.get(baseName) || 0;
          used.set(baseName, seen + 1);
          const name = seen ? `${baseName}${seen + 1}` : baseName;

          return {
            name,
            fullName,
            value: getValue(entry),
          };
        });
      }

      function buildMoleculeDataset(rows = [], course = {}) {
        if (!rows.length) {
          return [];
        }

        return [
          {
            name: "课程",
            fullName: course.name || "课程图谱",
            details: course.summary || course.remark || "课程图谱总览",
            nodes: rows.map((row, rowIndex) => ({
              name:
                compactDisplayLabel(
                  row.testPaper?.name || `项目${(row.sourceIndex ?? rowIndex) + 1}`,
                  9,
                ) || `项目${(row.sourceIndex ?? rowIndex) + 1}`,
              fullName:
                row.testPaper?.name || `项目${(row.sourceIndex ?? rowIndex) + 1}`,
              details: `${(row.testPaperProblems || []).length} 个任务`,
              nodes: (row.testPaperProblems || []).map((item, itemIndex) => {
                const pointGroups = getPointGroups(item);
                const taskParts = [];
                if (pointGroups.knowledgePoints.length) {
                  taskParts.push(`${pointGroups.knowledgePoints.length} 个知识点`);
                }
                if (pointGroups.skillPoints.length) {
                  taskParts.push(`${pointGroups.skillPoints.length} 个技能点`);
                }
                const abilityCount = dedupeSkills(item.skills || []).length;
                if (abilityCount) {
                  taskParts.push(`${abilityCount} 个职业能力`);
                }

                return {
                  name: `任务${itemIndex + 1}`,
                  fullName: getResourceTitle(item),
                  details:
                    [getResourceTitle(item), taskParts.join(" / ")]
                      .filter(Boolean)
                      .join(" ｜ ") || "任务节点",
                };
              }),
            })),
          },
        ];
      }

      function buildRoleTreemapDataset(rows = [], filter = {}) {
        const activeJobs = getActiveJobSelectionSet(filter);
        const selectedSkillKeys = getSelectedSkillSet(filter);

        return collectRoleBuckets(rows).map((role) => {
          const roleActive = activeJobs.has(role.jobPosition);
          return {
            name: role.jobPosition,
            value: role.taskCount,
            color: roleActive ? ACCENT : ACCENT_SOFT_ALT,
            nodeType: "role",
            jobPosition: role.jobPosition,
            children: role.skills.map((skill) => {
              const abilityActive = isExactAbilitySelected(
                skill.id,
                role.jobPosition,
                filter,
              );
              return {
                name: skill.name,
                value: skill.taskCount,
                color: abilityActive
                  ? ACCENT
                  : roleActive
                    ? ACCENT_TINT
                    : ACCENT_SOFT,
                nodeType: "ability",
                skillId: skill.id,
                skillName: skill.name,
                jobPosition: role.jobPosition,
                isActive: abilityActive || selectedSkillKeys.has(getSelectedSkillKey(skill.id, role.jobPosition)),
              };
            }),
          };
        });
      }

      function buildRoleWordCloudDataset(rows = []) {
        return createCloudDataset(
          collectRoleBuckets(rows),
          (role) => role.jobPosition,
          (role) => role.taskCount,
          7,
        );
      }

      function buildAbilityWordCloudDataset(rows = []) {
        return createCloudDataset(
          collectAbilityBuckets(rows),
          (ability) => ability.name,
          (ability) => ability.taskCount,
          6,
        );
      }

      function getFilterDescription(filter = {}) {
        const parts = [];
        if ((filter.jobPositions || []).length) {
          parts.push(
            filter.jobPositions.length === 1
              ? filter.jobPositions[0]
              : `${filter.jobPositions.length} 个岗位`,
          );
        }
        if ((filter.skills || []).length) {
          const skillNames = Array.from(
            new Set((filter.skills || []).map((skill) => skill.name).filter(Boolean)),
          );
          parts.push(
            skillNames.length <= 1
              ? skillNames[0] || "1 个职业能力"
              : `${skillNames.length} 个职业能力`,
          );
        }
        return parts.join(" / ");
      }

      async function bootstrap() {
        try {
          const [{ createApp, ref, computed }, { VueUiMolecule, VueUiTreemap, VueUiWordCloud }] =
            await Promise.all([import("vue"), import("vue-data-ui")]);

          createApp({
            components: {
              VueUiMolecule,
              VueUiTreemap,
              VueUiWordCloud,
            },
            setup() {
              const rows = data.rows || [];
              const course = data.course || {};
              const filter = ref(
                normalizeFilter({
                  jobPositions: [],
                  skills: [],
                }),
              );

              const totalMetrics = computed(() => collectCourseMetrics(rows));
              const filteredRows = computed(() => filterRows(rows, filter.value));
              const visibleMetrics = computed(() =>
                collectCourseMetrics(filteredRows.value),
              );
              const moleculeDataset = computed(() =>
                buildMoleculeDataset(filteredRows.value, course),
              );
              const roleTreemapDataset = computed(() =>
                buildRoleTreemapDataset(rows, filter.value),
              );
              const roleWordCloudDataset = computed(() =>
                buildRoleWordCloudDataset(rows),
              );
              const abilityBuckets = computed(() => collectAbilityBuckets(rows));
              const abilityWordCloudDataset = computed(() =>
                buildAbilityWordCloudDataset(rows),
              );
              const hasActiveFilterState = computed(() =>
                hasActiveFilter(filter.value),
              );
              const filterDescription = computed(() =>
                getFilterDescription(filter.value),
              );
              const activeBadges = computed(() => {
                const badges = [];
                (filter.value.jobPositions || []).forEach((jobPosition) => {
                  badges.push({ label: jobPosition, type: "job" });
                });
                const abilityNames = Array.from(
                  new Set((filter.value.skills || []).map((skill) => skill.name).filter(Boolean)),
                );
                abilityNames.forEach((name) => {
                  badges.push({ label: name, type: "ability" });
                });
                return badges;
              });

              function setFilter(nextFilter) {
                filter.value = normalizeFilter(nextFilter);
              }

              function clearFilter() {
                setFilter({});
              }

              function toggleJobPosition(jobPosition) {
                const normalizedFilter = normalizeFilter(filter.value);
                const nextJobs = new Set(normalizedFilter.jobPositions || []);
                const nextSkills = (normalizedFilter.skills || []).filter(
                  (skill) => skill.jobPosition !== jobPosition,
                );

                if (nextJobs.has(jobPosition)) {
                  nextJobs.delete(jobPosition);
                } else {
                  nextJobs.add(jobPosition);
                }

                setFilter({
                  jobPositions: Array.from(nextJobs.values()),
                  skills: nextSkills,
                });
              }

              function toggleExactAbility(skillOption) {
                const normalizedFilter = normalizeFilter(filter.value);
                const selected = new Map(
                  (normalizedFilter.skills || []).map((skill) => [
                    getSelectedSkillKey(skill.id, skill.jobPosition),
                    skill,
                  ]),
                );
                const key = getSelectedSkillKey(
                  skillOption.id,
                  skillOption.jobPosition,
                );

                if (selected.has(key)) {
                  selected.delete(key);
                } else {
                  selected.set(key, {
                    id: String(skillOption.id),
                    name: skillOption.name,
                    jobPosition: skillOption.jobPosition,
                  });
                }

                setFilter({
                  jobPositions: normalizedFilter.jobPositions || [],
                  skills: Array.from(selected.values()),
                });
              }

              function toggleAbilityName(name) {
                const ability = abilityBuckets.value.find((entry) => entry.name === name);
                if (!ability) {
                  return;
                }

                const normalizedFilter = normalizeFilter(filter.value);
                const selected = new Map(
                  (normalizedFilter.skills || []).map((skill) => [
                    getSelectedSkillKey(skill.id, skill.jobPosition),
                    skill,
                  ]),
                );
                const selectionKeys = ability.selections
                  .map((skill) => getSelectedSkillKey(skill.id, skill.jobPosition))
                  .filter(Boolean);
                const allSelected = selectionKeys.every((key) => selected.has(key));

                if (allSelected) {
                  selectionKeys.forEach((key) => selected.delete(key));
                } else {
                  ability.selections.forEach((skill) => {
                    selected.set(getSelectedSkillKey(skill.id, skill.jobPosition), {
                      id: String(skill.id),
                      name: skill.name,
                      jobPosition: skill.jobPosition,
                    });
                  });
                }

                setFilter({
                  jobPositions: normalizedFilter.jobPositions || [],
                  skills: Array.from(selected.values()),
                });
              }

              function handleTreemapClick({ datapoint }) {
                if (!datapoint) {
                  return;
                }

                if (datapoint.nodeType === "role") {
                  toggleJobPosition(datapoint.jobPosition || datapoint.name);
                  return;
                }

                if (datapoint.nodeType === "ability") {
                  toggleExactAbility({
                    id: datapoint.skillId,
                    name: datapoint.skillName || datapoint.name,
                    jobPosition: datapoint.jobPosition,
                  });
                }
              }

              function handleRoleWordClick({ datapoint }) {
                const jobName = datapoint?.fullName || datapoint?.name;
                if (!jobName) {
                  return;
                }
                toggleJobPosition(jobName);
              }

              function handleAbilityWordClick({ datapoint }) {
                const abilityName = datapoint?.fullName || datapoint?.name;
                if (!abilityName) {
                  return;
                }
                toggleAbilityName(abilityName);
              }

              const moleculeConfig = computed(() => ({
                theme: "zen",
                customPalette: [ACCENT, "#ffab76", "#ffd4bf", "#f8e6dc"],
                userOptions: { show: false },
                table: { show: false },
                style: {
                  fontFamily: "Nunito Sans, PingFang SC, sans-serif",
                  chart: {
                    backgroundColor: "transparent",
                    color: INK,
                    nodes: {
                      stroke: "#efc7b1",
                      strokeHovered: ACCENT,
                    },
                    links: {
                      stroke: "#efc7b1",
                    },
                    tooltip: {
                      backgroundColor: INK,
                      color: "#fffaf8",
                      customFormat: ({ datapoint }) =>
                        `<div><strong>${escapeHtml(datapoint?.fullName || datapoint?.name || "")}</strong></div><div>${escapeHtml(datapoint?.details || "")}</div>`,
                    },
                    zoom: {
                      show: false,
                    },
                  },
                },
              }));

              const treemapConfig = computed(() => ({
                responsive: true,
                customPalette: [ACCENT, ACCENT_SOFT_ALT, ACCENT_TINT, NEUTRAL_SOFT],
                userOptions: { show: false },
                table: { show: false },
                events: {
                  datapointClick: handleTreemapClick,
                },
                style: {
                  fontFamily: "Nunito Sans, PingFang SC, sans-serif",
                  chart: {
                    backgroundColor: "transparent",
                    color: INK,
                    height: 360,
                    padding: { top: 0, right: 0, bottom: 0, left: 0 },
                    layout: {
                      sorted: true,
                      rects: {
                        stroke: "#fffaf8",
                        strokeWidth: 2,
                        borderRadius: 8,
                        selected: {
                          stroke: ACCENT,
                          strokeWidth: 2,
                          unselectedOpacity: 0.45,
                        },
                        group: {
                          stroke: "#f0e4dc",
                          strokeWidth: 1,
                          useSeriesBackgroundColor: false,
                          backgroundLighterRatio: 0,
                          label: {
                            adaptColorToBackground: false,
                            color: INK,
                          },
                        },
                      },
                      labels: {
                        showDefaultLabels: true,
                        fontSize: 12,
                        minFontSize: 10,
                        hideUnderProportion: 0.03,
                        name: {
                          show: true,
                          bold: true,
                        },
                        value: {
                          show: false,
                          bold: false,
                        },
                      },
                    },
                    legend: {
                      show: false,
                    },
                    tooltip: {
                      backgroundColor: INK,
                      color: "#fffaf8",
                      roundingValue: 0,
                      customFormat: ({ datapoint }) => {
                        const title = datapoint?.parentName ? "职业能力" : "岗位";
                        const subtitle = datapoint?.parentName
                          ? `所属岗位：${datapoint.parentName}`
                          : `匹配任务：${datapoint?.value || 0}`;
                        const detail = datapoint?.parentName
                          ? `匹配任务：${datapoint?.value || 0}`
                          : "点击可切换岗位筛选";
                        return `<div><strong>${title}｜${escapeHtml(datapoint?.name || "")}</strong></div><div>${escapeHtml(subtitle)}</div><div>${escapeHtml(detail)}</div>`;
                      },
                    },
                  },
                },
              }));

              const roleWordCloudConfig = computed(() => ({
                responsive: true,
                customPalette: [ACCENT, ACCENT_SOFT_ALT, ACCENT_TINT, NEUTRAL_SOFT],
                userOptions: { show: false },
                table: { show: false },
                useCssAnimation: true,
                animationDelayMs: 18,
                events: {
                  datapointClick: handleRoleWordClick,
                },
                style: {
                  fontFamily: "Nunito Sans, PingFang SC, sans-serif",
                  chart: {
                    backgroundColor: "transparent",
                    color: INK,
                    height: 320,
                    zoom: {
                      show: false,
                    },
                    controls: {
                      show: false,
                    },
                    words: {
                      maxFontSize: 16,
                      minFontSize: 9,
                      bold: true,
                      proximity: 0.22,
                      packingWeight: 0.28,
                      usePalette: true,
                      hoverOpacity: 0.88,
                      selectedStroke: ACCENT,
                    },
                    tooltip: {
                      backgroundColor: INK,
                      color: "#fffaf8",
                      roundingValue: 0,
                      customFormat: ({ datapoint }) =>
                        `<div><strong>岗位｜${escapeHtml(datapoint?.fullName || datapoint?.name || "")}</strong></div><div>匹配任务：${escapeHtml(datapoint?.value || 0)}</div>`,
                    },
                  },
                },
              }));

              const abilityWordCloudConfig = computed(() => ({
                responsive: true,
                customPalette: [ACCENT, ACCENT_SOFT_ALT, ACCENT_TINT, NEUTRAL_SOFT],
                userOptions: { show: false },
                table: { show: false },
                useCssAnimation: true,
                animationDelayMs: 22,
                events: {
                  datapointClick: handleAbilityWordClick,
                },
                style: {
                  fontFamily: "Nunito Sans, PingFang SC, sans-serif",
                  chart: {
                    backgroundColor: "transparent",
                    color: INK,
                    height: 340,
                    zoom: {
                      show: false,
                    },
                    controls: {
                      show: false,
                    },
                    words: {
                      maxFontSize: 13,
                      minFontSize: 8,
                      bold: true,
                      proximity: 0.2,
                      packingWeight: 0.22,
                      usePalette: true,
                      hoverOpacity: 0.88,
                      selectedStroke: ACCENT,
                    },
                    tooltip: {
                      backgroundColor: INK,
                      color: "#fffaf8",
                      roundingValue: 0,
                      customFormat: ({ datapoint }) =>
                        `<div><strong>职业能力｜${escapeHtml(datapoint?.fullName || datapoint?.name || "")}</strong></div><div>匹配任务：${escapeHtml(datapoint?.value || 0)}</div>`,
                    },
                  },
                },
              }));

              return {
                course,
                totalMetrics,
                visibleMetrics,
                filteredRows,
                moleculeDataset,
                roleTreemapDataset,
                roleWordCloudDataset,
                abilityWordCloudDataset,
                hasActiveFilter: hasActiveFilterState,
                filterDescription,
                activeBadges,
                clearFilter,
                moleculeConfig,
                treemapConfig,
                roleWordCloudConfig,
                abilityWordCloudConfig,
              };
            },
            template: `
              <div class="skillmap-page">
                <section class="hero-card card">
                  <div class="hero-copy">
                    <p class="hero-eyebrow">课程图谱</p>
                    <h1 class="hero-title">{{ course.name }}</h1>
                    <p class="hero-summary">{{ course.summary || course.remark || '当前课程暂无说明。' }}</p>
                  </div>
                  <div class="hero-stats">
                    <article class="hero-stat">
                      <p class="hero-stat-value">{{ totalMetrics.unitCount }}</p>
                      <p class="hero-stat-label">项目</p>
                    </article>
                    <article class="hero-stat">
                      <p class="hero-stat-value">{{ totalMetrics.itemCount }}</p>
                      <p class="hero-stat-label">任务</p>
                    </article>
                    <article class="hero-stat">
                      <p class="hero-stat-value">{{ totalMetrics.knowledgePoints.length }}</p>
                      <p class="hero-stat-label">知识点/技能点</p>
                    </article>
                    <article class="hero-stat">
                      <p class="hero-stat-value">{{ totalMetrics.roleCount }}</p>
                      <p class="hero-stat-label">岗位</p>
                    </article>
                  </div>
                </section>

                <div class="content-grid">
                  <section class="graph-card card">
                    <div class="card-head">
                      <h2 class="card-title">课程 → 项目 → 任务</h2>
                      <p class="card-copy">
                        {{ hasActiveFilter ? '当前按 ' + filterDescription + ' 裁剪主图，只保留匹配路径。' : '主图区只承载课程、项目和任务的骨架关系，确保课程图谱一眼可读。' }}
                      </p>
                    </div>
                    <div class="chart-shell chart-shell-lg">
                      <div v-if="!filteredRows.length" class="chart-empty">
                        当前筛选下没有匹配的项目或任务。
                      </div>
                      <vue-ui-molecule
                        v-else
                        class="chart-component"
                        :dataset="moleculeDataset"
                        :config="moleculeConfig"
                      />
                    </div>
                  </section>

                  <aside class="side-stack">
                    <section v-if="hasActiveFilter" class="side-card card current-view-card">
                      <div class="card-head-inline">
                        <div class="card-head-main">
                          <h2 class="card-title">当前视图</h2>
                          <p class="card-copy">按当前筛选统计课程图谱被保留的范围。</p>
                        </div>
                        <button type="button" class="reset-button" @click="clearFilter">
                          清除筛选
                        </button>
                      </div>
                      <p class="current-view-copy">当前筛选：{{ filterDescription }}</p>
                      <div v-if="activeBadges.length" class="panel-badge-row">
                        <span
                          v-for="badge in activeBadges"
                          :key="badge.type + '-' + badge.label"
                          class="panel-badge"
                          :class="{ 'is-accent': badge.type === 'ability' }"
                        >
                          {{ badge.label }}
                        </span>
                      </div>
                      <div class="current-view-grid">
                        <article class="current-view-stat">
                          <p class="current-view-stat-value">{{ visibleMetrics.unitCount }}</p>
                          <p class="current-view-stat-label">匹配项目</p>
                        </article>
                        <article class="current-view-stat">
                          <p class="current-view-stat-value">{{ visibleMetrics.itemCount }}</p>
                          <p class="current-view-stat-label">匹配任务</p>
                        </article>
                        <article class="current-view-stat">
                          <p class="current-view-stat-value">{{ visibleMetrics.knowledgePoints.length }}</p>
                          <p class="current-view-stat-label">匹配知识点/技能点</p>
                        </article>
                      </div>
                    </section>

                    <section class="side-card card">
                      <div class="card-head">
                        <h2 class="card-title">岗位 → 职业能力</h2>
                        <p class="card-copy">Treemap 使用全课程集合。点击岗位或职业能力，可直接驱动筛选。</p>
                      </div>
                      <div class="chart-shell">
                        <div v-if="!roleTreemapDataset.length" class="chart-empty">
                          当前课程暂无岗位和职业能力映射。
                        </div>
                        <vue-ui-treemap
                          v-else
                          class="chart-component"
                          :dataset="roleTreemapDataset"
                          :config="treemapConfig"
                        />
                      </div>
                    </section>

                    <section class="side-card card">
                      <div class="card-head">
                        <h2 class="card-title">岗位词云</h2>
                        <p class="card-copy">使用岗位的任务覆盖量作为词云权重。</p>
                      </div>
                      <div class="chart-shell">
                        <div v-if="!roleWordCloudDataset.length" class="chart-empty">
                          当前课程暂无岗位数据。
                        </div>
                        <vue-ui-word-cloud
                          v-else
                          class="chart-component"
                          :dataset="roleWordCloudDataset"
                          :config="roleWordCloudConfig"
                        />
                      </div>
                    </section>

                    <section class="side-card card">
                      <div class="card-head">
                        <h2 class="card-title">职业能力词云</h2>
                        <p class="card-copy">同名职业能力合并统计，点击后会勾选该能力对应的全部岗位版本。</p>
                      </div>
                      <div class="chart-shell">
                        <div v-if="!abilityWordCloudDataset.length" class="chart-empty">
                          当前课程暂无职业能力数据。
                        </div>
                        <vue-ui-word-cloud
                          v-else
                          class="chart-component"
                          :dataset="abilityWordCloudDataset"
                          :config="abilityWordCloudConfig"
                        />
                      </div>
                    </section>
                  </aside>
                </div>
              </div>
            `,
          }).mount(appRoot);
        } catch (error) {
          console.error("Skillmap bootstrap failed", error);
          renderBootError(
            "课程图谱模块加载失败。请确认当前网络可以访问 Vue 3 和 vue-data-ui CDN，然后刷新页面重试。",
          );
        }
      }

      bootstrap();
    </script>
  </body>
</html>
