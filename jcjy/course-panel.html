<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skillmap</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Nunito+Sans:wght@400;500;600;700;800&family=Varela+Round&display=swap");

      :root {
        --bg: #fffaf8;
        --panel: #ffffff;
        --panel-alt: #fff7f3;
        --ink: #1f2330;
        --muted: #7a8094;
        --line: #e2e7f0;
        --line-strong: #ead8cd;
        --problem: oklch(98.6% 0.017 68);
        --teaching-module: oklch(99.1% 0.01 82);
        --skill: #ffffff;
        --industry: #ffffff;
        --unit: #ffffff;
        --radius-lg: 8px;
        --radius-md: 8px;
        --radius-sm: 8px;
        --accent: rgb(250, 112, 46);
        --accent-text: #b84b1a;
        --accent-text-soft: #9d5a36;
        --accent-border: #f8a47d;
        --accent-border-strong: #f58b5a;
        --accent-surface: #fff1e8;
        --accent-surface-soft: #fff7f1;
        --accent-surface-muted: #fffaf7;
        --accent-ring: rgba(250, 112, 46, 0.16);
        --glow-default: rgba(250, 112, 46, 0.34);
        --knowledge-surface: oklch(98.7% 0.014 80);
        --knowledge-border: oklch(92.6% 0.024 76);
        --knowledge-text: oklch(56% 0.06 64);
        --skill-point-surface: oklch(97.3% 0.03 48);
        --skill-point-border: oklch(89.5% 0.052 47);
        --skill-point-text: oklch(59% 0.145 44);
        --body-font:
          "Nunito Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        --display-font:
          "Varela Round", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        --code-font: "Fira Code", "SFMono-Regular", monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      html {
        color-scheme: light;
        font-family: var(--body-font);

        color: var(--ink);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      #app {
        width: min(100%, 1720px);
        margin: 0 auto;
        padding: 10px;
      }

      .page-header {
        text-align: center;
        margin-bottom: 10px;
      }

      .page-title {
        margin: 0;
        font-family: var(--display-font);
        font-size: clamp(32px, 4vw, 52px);
        line-height: 1.08;
        letter-spacing: -0.05em;
        font-weight: 700;
      }

      .page-layout {
        display: grid;
        grid-template-columns: minmax(260px, 320px) minmax(0, 1fr) minmax(
            250px,
            300px
          );
        grid-template-areas: "summary main map";
        gap: clamp(16px, 2vw, 24px);
        align-items: start;
      }

      .page-layout > * {
        min-width: 0;
      }

      .course-map {
        grid-area: map;
        display: flex;
        gap: 16px;
        flex-direction: column;
        min-height: 0;
        padding: 10px;
        height: calc(100vh - 20px);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
      }

      .panel-head {
        display: grid;
        gap: 6px;
      }

      .panel-head-inline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-head-inline .panel-title {
        flex: 1 1 auto;
        min-width: 0;
      }

      .panel-title {
        margin: 0;
        font-family: var(--display-font);
        font-size: clamp(22px, 2vw, 30px);
        line-height: 1.1;
        letter-spacing: -0.04em;
        font-weight: 700;
      }

      .course-map .panel-title,
      .page-summary .panel-title {
        color: var(--accent-text);
      }

      .panel-copy {
        margin: 0;
        font-size: 13px;
        line-height: 1.6;
        color: var(--muted);
      }

      .course-map-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
      }

      .course-map-filter-pill,
      .course-map-reset {
        min-height: 44px;
        padding: 9px 14px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        font-size: 12px;
        line-height: 1.2;
      }

      .course-map-filter-pill {
        display: inline-flex;
        align-items: center;
      }

      .course-map-reset {
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          color 180ms ease;
      }

      .course-map-reset:hover,
      .course-map-reset:focus-visible {
        border-color: var(--accent-border);
        background: var(--accent-surface-soft);
        outline: none;
        box-shadow: 0 0 0 4px var(--accent-ring);
      }

      .summary-reset {
        flex: 0 0 auto;
        min-height: 32px;
        padding: 6px 10px;
      }

      .course-map-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        padding-right: 2px;
        align-content: start;
      }

      .course-map-card {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          box-shadow 180ms ease;
      }

      .course-map-card.is-active {
        border-color: var(--accent-border);
        background: var(--accent-surface-soft);
        box-shadow:
          0 0 0 1px rgba(248, 164, 125, 0.72),
          0 10px 26px -24px rgba(39, 48, 77, 0.14),
          0 0 0 1px rgba(255, 255, 255, 0.9) inset;
      }

      .course-map-card.is-dimmed {
        background: var(--accent-surface-muted);
        border-color: #efe3db;
        opacity: 0.86;
      }

      .course-map-card:hover,
      .course-map-card:focus-visible {
        border-color: var(--accent-border-strong);
        outline: none;
      }

      .course-map-card-status {
        position: absolute;
        top: 10px;
        right: 12px;
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 4px 8px;
        border: 1px solid var(--accent-border);
        border-radius: 8px;
        background: var(--accent-surface);
        font-family: var(--code-font);
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.06em;
        color: var(--accent-text);
      }

      .course-map-card-title {
        margin: 0;
        font-family: var(--display-font);
        font-size: 18px;
        line-height: 1.18;
        letter-spacing: -0.03em;
        font-weight: 700;
      }

      .course-map-role-button {
        display: block;
        width: 100%;
        padding: 0;
        color: inherit;
        text-align: left;
      }

      .course-map-card-skills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .course-map-skill,
      .course-map-meta {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 6px 10px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        font-size: 12px;
        line-height: 1.25;
        color: var(--ink);
      }

      .course-map-skill {
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          color 180ms ease,
          box-shadow 180ms ease;
      }

      .course-map-skill:hover,
      .course-map-skill:focus-visible {
        border-color: var(--accent-border-strong);
        background: var(--accent-surface-soft);
        outline: none;
        box-shadow: 0 0 0 4px var(--accent-ring);
      }

      .course-map-skill.is-active {
        border-color: var(--accent-border);
        background: var(--accent-surface);
        color: var(--accent-text);
      }

      .course-map-card-industry {
        margin: 0;
        font-size: 11px;
        line-height: 1.4;
        color: var(--muted);
        text-align: left;
      }

      .course-map-empty {
        flex: 1 1 auto;
        display: grid;
        align-content: center;
        padding: 18px;
        border: 4px solid var(--accent-border);
        border-radius: 8px;
        background: var(--accent-surface-soft);
        font-size: 14px;
        color: var(--muted);
        text-align: center;
      }

      .page-main {
        grid-area: main;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .page-summary {
        grid-area: summary;
        display: grid;
        gap: 18px;
        align-self: start;
      }

      .summary-card {
        display: grid;
        gap: 16px;
        padding: clamp(18px, 2.2vw, 24px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .summary-card.summary-card-current {
        border-color: var(--accent-border);
        background: linear-gradient(
          180deg,
          var(--accent-surface-soft) 0%,
          #ffffff 100%
        );
      }

      .summary-card-current .summary-copy {
        color: var(--accent-text-soft);
      }

      .page-main-empty {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        text-align: center;
        color: var(--muted);
      }

      .summary-intro {
        margin: 0;
        font-size: 14px;
        line-height: 1.75;
        color: var(--ink);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .summary-grid.current-view-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .summary-grid.current-view-grid .summary-stat {
        padding: 10px 8px;
      }

      .summary-grid.current-view-grid .summary-stat-value {
        font-size: 22px;
      }

      .summary-grid.current-view-grid .summary-stat-label {
        font-size: 11px;
        line-height: 1.35;
      }

      .summary-stat {
        display: grid;
        gap: 4px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .summary-card-current .summary-stat {
        border-color: var(--accent-border);
        background: rgba(255, 255, 255, 0.82);
      }

      .summary-stat-value {
        margin: 0;
        font-family: var(--display-font);
        font-size: 26px;
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--ink);
      }

      .summary-card-current .summary-stat-value {
        color: var(--accent-text);
      }

      .summary-stat-label {
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
      }

      .summary-card-current .summary-stat-label {
        color: var(--accent-text-soft);
      }

      .summary-section {
        display: grid;
        gap: 10px;
        padding-top: 12px;
      }

      .summary-section-title {
        margin: 0;
        font-family: var(--code-font);
        font-size: 11px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-text-soft);
      }

      .summary-tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .summary-tag {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        font-size: 12px;
        line-height: 1.35;
        color: var(--ink);
      }

      button.summary-tag {
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background-color 180ms ease,
          color 180ms ease,
          box-shadow 180ms ease;
      }

      button.summary-tag:hover,
      button.summary-tag:focus-visible {
        border-color: var(--accent-border-strong);
        background: var(--accent-surface-soft);
        outline: none;
        box-shadow: 0 0 0 4px var(--accent-ring);
      }

      button.summary-tag.is-active {
        border-color: var(--accent-border);
        background: var(--accent-surface);
        color: var(--accent-text);
      }

      button.summary-tag.is-partial {
        border-color: #f2c6af;
        background: var(--accent-surface-soft);
        color: var(--accent-text-soft);
      }

      .summary-copy {
        margin: 0;
        font-size: 13px;
        line-height: 1.65;
        color: var(--muted);
      }

      .summary-unit-list {
        display: grid;
        gap: 8px;
      }

      .summary-unit-item {
        display: grid;
        gap: 3px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .summary-unit-name {
        margin: 0;
        font-size: 14px;
        line-height: 1.4;
        font-weight: 600;
        color: var(--ink);
      }

      .summary-unit-meta {
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
      }

      .page-main-empty-copy {
        margin: 0;
        max-width: 34ch;
        font-size: 14px;
        line-height: 1.6;
      }

      .lane {
        position: relative;
        overflow: visible;
        display: grid;
        gap: 12px;
        padding: clamp(14px, 1.6vw, 18px);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow:
          0 10px 26px -24px rgba(39, 48, 77, 0.14),
          0 0 0 1px rgba(255, 255, 255, 0.9) inset;
      }

      .lane-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }

      .lane-entry {
        display: grid;
        align-self: start;
        align-content: start;
        justify-items: start;
        gap: 8px;
        padding: 0 0 10px;
        border: 0;
        border-radius: 0;
        background: transparent;
        border-bottom: 1px solid var(--line);
        color: var(--ink);
      }

      .lane-entry-top {
        display: grid;
        justify-items: start;
        gap: 6px;
        text-align: left;
      }

      .lane-index {
        width: fit-content;
        padding: 5px 8px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        font-family: var(--code-font);
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .lane-type {
        width: fit-content;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1;
        color: var(--muted);
        background: #ffffff;
      }

      .lane-name {
        margin: 0;
        font-family: var(--display-font);
        font-size: clamp(22px, 1.9vw, 30px);
        line-height: 1.08;
        letter-spacing: -0.04em;
        font-weight: 700;
      }

      .lane-skills {
        display: grid;
        width: 100%;
        gap: 6px;
        padding: 0;
        border-top: 0;
      }

      .lane-skills-title {
        margin: 0;
        font-family: var(--code-font);
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .lane-skill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-start;
      }

      .lane-skill-chip {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 4px 8px;
        border: 2px solid var(--accent-border);
        border-radius: 8px;
        background: var(--accent-surface-soft);
        font-size: 11px;
        line-height: 1.3;
        color: var(--accent-text-soft);
      }

      .lane-skill-chip.is-empty {
        color: var(--muted);
        border-color: var(--line-strong);
        background: #ffffff;
      }

      .lane-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-start;
        font-family: var(--code-font);
        font-size: 11px;
        color: var(--muted);
      }

      .lane-meta span {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 3px 7px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .lane-scroller {
        overflow: visible;
        border: 0;
        border-radius: 0;
        background: transparent;
      }

      .lane-scroller:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 3px;
      }

      .lane-track {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 14px;
        align-items: stretch;
        min-height: 100%;
        padding: 0;
      }

      .item-cluster {
        display: grid;
        gap: 10px;
        align-content: start;
        min-width: 0;
        padding: 12px 16px 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        transition:
          background-color 180ms ease,
          border-color 180ms ease,
          color 180ms ease;
      }

      .item-cluster:hover,
      .item-cluster:focus-visible {
        border-color: var(--accent-border);
      }

      .cluster-index {
        width: fit-content;
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: transparent;
        font-family: var(--code-font);
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .cluster-group {
        display: grid;
        gap: 8px;
        padding: 6px 0 0;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
      }

      .cluster-group-title {
        margin: 0;
        font-family: var(--code-font);
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-text-soft);
      }

      .cluster-list {
        display: grid;
        gap: 10px;
      }

      .chip-group {
        display: grid;
        gap: 8px;
        padding: 6px 0 0;
        border: 0;
        border-top: 1px solid var(--line);
        border-radius: 0;
        background: transparent;
      }

      .chip-group-title {
        margin: 0;
        font-family: var(--code-font);
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .point-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .point-column {
        min-width: 0;
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .point-column + .point-column {
        padding-left: 12px;
        border-left: 1px solid var(--line);
      }

      .point-column-title {
        margin: 0;
        font-family: var(--display-font);
        font-size: 12px;
        line-height: 1.2;
        font-weight: 600;
        color: var(--knowledge-text);
      }

      .point-column-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .point-column-empty {
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
      }

      .chip-group-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .knowledge-chip {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 5px 10px;
        border: 2px solid var(--knowledge-border);
        border-radius: 8px;
        background: var(--knowledge-surface);
        font-size: 11px;
        line-height: 1.3;
        font-weight: 400;
        color: var(--knowledge-text);
      }

      .point-column[data-tone="skill"] .point-column-title {
        color: var(--skill-point-text);
      }

      .knowledge-chip.is-skill-point {
        border-color: var(--skill-point-border);
        background: var(--skill-point-surface);
        color: var(--skill-point-text);
      }

      .cluster-list.relation-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .task-header {
        display: grid;
        gap: 4px;
      }

      .task-title {
        margin: 0;
        font-family: var(--display-font);
        font-size: clamp(17px, 1.6vw, 21px);
        line-height: 1.3;
        letter-spacing: -0.03em;
        font-weight: 700;
        color: var(--ink);
      }

      .task-detail-list {
        display: grid;
        gap: 0;
        padding-top: 2px;
      }

      .task-detail {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        gap: 10px 12px;
        align-items: start;
        padding: 8px 0;
        border-top: 1px solid var(--line);
      }

      .task-detail:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .task-detail-label {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        font-weight: 700;
        color: var(--accent-text-soft);
      }

      .task-detail-value {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      .task-detail-item {
        margin: 0;
        font-size: 13px;
        line-height: 1.55;
        color: var(--ink);
        word-break: break-word;
      }

      .task-detail-item.is-active {
        color: var(--accent-text);
        font-weight: 700;
      }

      .task-detail-item.is-muted {
        color: var(--muted);
      }

      const KNOWLEDGE_POINT_TYPES = new Set([1, 10000]);

      function createElement(tag, className, text) {
        const element = document.createElement(tag);
        if (className) {
          element.className = className;
        }
        if (text !== undefined) {
          element.textContent = text;

      function getSkillKey(skill) {
        if (!skill) {
          return "";
        }

        return skill.id != null ? String(skill.id) : skill.name || "";
      }

      function getIndustryJobPosition(industry) {
        return industry?.jobPosition || "未绑定岗位";
      }

      function getSelectedSkillKey(skillId, jobPosition) {
        if (skillId == null) {
          return "";
        }

        return `${jobPosition || "未绑定岗位"}::${String(skillId)}`;
      }

      function normalizeFilter(filter = {}) {
        const jobPositions = new Set();
        const skillMap = new Map();

        const appendJobPosition = (jobPosition) => {
          if (!jobPosition) {
            return;
          }

          jobPositions.add(jobPosition);
        };

        const appendSkill = (skillLike, fallbackJobPosition) => {
          if (!skillLike) {
            return;
          }

          const skillId =
            skillLike.id != null
              ? String(skillLike.id)
              : skillLike.skillId != null
                ? String(skillLike.skillId)
                : "";

          if (!skillId) {
            return;
          }

          const jobPosition =
            skillLike.jobPosition || fallbackJobPosition || "未绑定岗位";
          const key = getSelectedSkillKey(skillId, jobPosition);
          if (skillMap.has(key)) {
            return;
          }

          skillMap.set(key, {
            id: skillId,
            name: skillLike.name || skillLike.skillName || "",
            jobPosition,
          });
        };

        if (Array.isArray(filter.jobPositions)) {
          filter.jobPositions.forEach(appendJobPosition);
        } else if (filter.jobPosition) {
          appendJobPosition(filter.jobPosition);
        }

        if (Array.isArray(filter.skills)) {
          filter.skills.forEach((skill) => appendSkill(skill));
        } else if (filter.skillId != null) {
          appendSkill(
            {
              id: filter.skillId,
              name: filter.skillName,
              jobPosition: filter.jobPosition,
            },
            filter.jobPosition,
          );
        }

        return {
          jobPositions: Array.from(jobPositions.values()),
          skills: Array.from(skillMap.values()),
        };
      }

      function hasActiveFilter(filter = uiState.filter) {
        return Boolean(
          (filter.jobPositions || []).length || (filter.skills || []).length,
        );
      }

      function getDirectJobSelectionSet(filter = uiState.filter) {
        return new Set(filter.jobPositions || []);
      }

      function getActiveJobSelectionSet(filter = uiState.filter) {
        const jobPositions = getDirectJobSelectionSet(filter);

        (filter.skills || []).forEach((skill) => {
          if (skill?.jobPosition) {
            jobPositions.add(skill.jobPosition);
          }
        });

        return jobPositions;
      }

      function getSelectedSkillSet(filter = uiState.filter) {
        return new Set(
          (filter.skills || []).map((skill) =>
            getSelectedSkillKey(skill.id, skill.jobPosition),
          ),
        );
      }

      function getSkillJobPositions(skill) {
        const industries = dedupeIndustries([skill]);
        return industries.length
          ? industries.map((industry) => getIndustryJobPosition(industry))
          : ["未绑定岗位"];
      }

      function isSkillSelected(skill, jobPosition, filter = uiState.filter) {
        if (!skill) {
          return false;
        }

        const key = getSelectedSkillKey(getSkillKey(skill), jobPosition);
        return getSelectedSkillSet(filter).has(key);
      }

      function getSkillOptionJobPositions(skillOption) {
        return skillOption?.jobPositions?.length
          ? skillOption.jobPositions
          : ["未绑定岗位"];
      }

      function getSelectedSkillOptionCount(
        skillOption,
        filter = uiState.filter,
      ) {
        if (!skillOption) {
          return 0;
        }

        const selectedSkillKeys = getSelectedSkillSet(filter);
        return getSkillOptionJobPositions(skillOption).filter((jobPosition) =>
          selectedSkillKeys.has(
            getSelectedSkillKey(skillOption.id, jobPosition),
          ),
        ).length;
      }

      function isSummarySkillFullySelected(
        skillOption,
        filter = uiState.filter,
      ) {
        const total = getSkillOptionJobPositions(skillOption).length;
        if (!total) {
          return false;
        }

        return getSelectedSkillOptionCount(skillOption, filter) === total;
      }

      function isSummarySkillPartiallySelected(
        skillOption,
        filter = uiState.filter,
      ) {
        const selectedCount = getSelectedSkillOptionCount(skillOption, filter);
        const total = getSkillOptionJobPositions(skillOption).length;
        return selectedCount > 0 && selectedCount < total;
      }

      function getFilterDescription(filter = uiState.filter) {
        const parts = [];

        if ((filter.jobPositions || []).length) {
          parts.push(
            filter.jobPositions.length === 1
              ? filter.jobPositions[0]
              : `${filter.jobPositions.length} 个岗位`,
          );
        }

        if ((filter.skills || []).length) {
          const skillNames = filter.skills
            .map((skill) => skill.name)
            .filter(Boolean);
          parts.push(
            filter.skills.length === 1
              ? skillNames[0] || "1 个职业能力"
              : `${filter.skills.length} 个职业能力`,
          );
        }

        return parts.join(" / ");
      }

      function dedupeIndustries(skills = []) {
        const industryMap = new Map();

        for (const skill of skills) {
          for (const industry of skill.industries || []) {
            const key =
              industry.jobPosition ||
              `${industry.industryLevel1}-${industry.industryLevel2}`;
            if (!industryMap.has(key)) {
              industryMap.set(key, industry);
            }
          }
        }

        return Array.from(industryMap.values());
      }

      function dedupeSkills(skills = []) {
        const skillMap = new Map();

        for (const skill of skills) {
          if (!skill) {
            continue;
          }

          const key = getSkillKey(skill);
          if (!skillMap.has(key)) {
            skillMap.set(key, skill);
          }
        }

        return Array.from(skillMap.values());
      }

      function getResourceTitle(item) {
        return item.problem?.title || item.teachingModule?.name || "未命名资源";
      }

      function getResourceLabel() {
        return "任务";
      }

      function getResourceMeta(item) {
        return null;
      }

      function getPointGroups(item) {
        const knowledgePoints = [];
        const skillPoints = [];
        const allPoints = [];
        const seen = new Set();

        (item.problem?.teachingModules || []).forEach((module) => {
          if (!module?.name) {
            return;
          }

          const key = module.id != null ? String(module.id) : module.name;
          if (seen.has(key)) {
            return;
          }

          seen.add(key);
          allPoints.push(module.name);

          if (SKILL_POINT_TYPES.has(module.type)) {
            skillPoints.push(module.name);
            return;
          }

          if (KNOWLEDGE_POINT_TYPES.has(module.type) || module.type == null) {
            knowledgePoints.push(module.name);
            return;
          }

          knowledgePoints.push(module.name);
        });

        return {
          knowledgePoints,
          skillPoints,
          allPoints,
        };
      }

      function getIndustryPath(industryLevel1, industryLevel2) {
        return [industryLevel1, industryLevel2].filter(Boolean).join("/");
      }

      function collectCourseRoleMap(rows = []) {
        const roleMap = new Map();

        rows.forEach((row) => {
          (row.testPaperProblems || []).forEach((item) => {
            (item.skills || []).forEach((skill) => {
              const normalizedSkillKey = getSkillKey(skill);
              const industries = dedupeIndustries([skill]);

              if (!industries.length) {
                const key = "未绑定岗位";
                if (!roleMap.has(key)) {
                  roleMap.set(key, {
                    jobPosition: key,
                    industryPaths: new Set(),
                    skills: new Map(),
                  });
                }

                roleMap.get(key).skills.set(normalizedSkillKey, {
                  id: normalizedSkillKey,
                  name: skill.name,
                });
                return;
              }

              industries.forEach((industry) => {
                const key = getIndustryJobPosition(industry);
                if (!roleMap.has(key)) {
                  roleMap.set(key, {
                    jobPosition: key,
                    industryPaths: new Set(),
                    skills: new Map(),
                  });
                }

                const entry = roleMap.get(key);
                entry.skills.set(normalizedSkillKey, {
                  id: normalizedSkillKey,
                  name: skill.name,
                });
                const industryPath = getIndustryPath(
                  industry.industryLevel1,
                  industry.industryLevel2,
                );
                if (industryPath) {
                  entry.industryPaths.add(industryPath);
                }
              });
            });
          });
        });

        return Array.from(roleMap.values())
          .map((entry) => ({
            jobPosition: entry.jobPosition,
            industryPaths: Array.from(entry.industryPaths.values()),
            skills: Array.from(entry.skills.values()),
          }))
          .sort((a, b) => b.skills.length - a.skills.length);
      }

      function collectCourseMetrics(rows = []) {
        const knowledgePoints = new Set();
        const skillMap = new Map();
        let itemCount = 0;
        let problemCount = 0;
        let moduleCount = 0;

        rows.forEach((row) => {
          (row.testPaperProblems || []).forEach((item) => {
            itemCount += 1;
            if (item.resourceType === "problem") {
              problemCount += 1;
            } else {
              moduleCount += 1;
            }

            getPointGroups(item).allPoints.forEach((point) => {
              if (point) {
                knowledgePoints.add(point);
              }
            });

            (item.skills || []).forEach((skill) => {
              const key = getSkillKey(skill);
              if (!key) {
                return;
              }

              if (!skillMap.has(key)) {
                skillMap.set(key, {
                  id: key,
                  name: skill.name,
                  count: 0,
                  jobPositions: new Set(),
                });
              }

              getSkillJobPositions(skill).forEach((jobPosition) => {
                skillMap.get(key).jobPositions.add(jobPosition);
              });
              skillMap.get(key).count += 1;
            });
          });
        });

        return {
          unitCount: rows.length,
          itemCount,
          problemCount,
          moduleCount,
          knowledgePoints: Array.from(knowledgePoints.values()),
          skills: Array.from(skillMap.values())
            .sort(
              (a, b) =>
                b.count - a.count ||
                (a.name || "").localeCompare(b.name || "", "zh-Hans-CN"),
            )
            .map((skill) => ({
              id: skill.id,
              name: skill.name,
              count: skill.count,
              jobPositions: Array.from(skill.jobPositions.values()),
            })),
          roleCount: collectCourseRoleMap(rows).length,
        };
      }

      function isSkillHighlighted(skill, filter = uiState.filter) {
        if (!skill || !hasActiveFilter(filter)) {
          return false;
        }

        const jobPositions = getSkillJobPositions(skill);
        const selectedSkillKeys = getSelectedSkillSet(filter);

        if (selectedSkillKeys.size) {
          const matchedSkill = jobPositions.some((jobPosition) =>
            selectedSkillKeys.has(
              getSelectedSkillKey(getSkillKey(skill), jobPosition),
            ),
          );
          if (matchedSkill) {
            return true;
          }
        }

        const selectedJobs = getDirectJobSelectionSet(filter);
        return jobPositions.some((jobPosition) =>
          selectedJobs.has(jobPosition),
        );
      }

      function createTaskDetail(label, items, options = {}) {
        const { numbered = false } = options;
        if (!items.length) {
          return null;
        }

        const detail = createElement("section", "task-detail");
        detail.append(createElement("p", "task-detail-label", `${label}:`));

        normalizedItems.forEach((item, index) => {

      function getItemJobEntries(item, filter = uiState.filter) {
        const activeJobs = getActiveJobSelectionSet(filter);
        return dedupeIndustries(item.skills || []).map((industry) => {
          const jobPosition = getIndustryJobPosition(industry);
          return {
            text: jobPosition,
            active: activeJobs.has(jobPosition),
          };
        });
      }

      function itemMatchesFilter(item, filter = uiState.filter) {
        if (!hasActiveFilter(filter)) {
          return true;
        }

        const selectedJobs = getDirectJobSelectionSet(filter);
        const selectedSkillKeys = getSelectedSkillSet(filter);

        return (item.skills || []).some((skill) => {
          const jobPositions = getSkillJobPositions(skill);
          const matchedJob = jobPositions.some((jobPosition) =>
            selectedJobs.has(jobPosition),
          );
          const matchedSkill = jobPositions.some((jobPosition) =>
            selectedSkillKeys.has(
              getSelectedSkillKey(getSkillKey(skill), jobPosition),
            ),
          );

          return matchedJob || matchedSkill;
        });
      }

      function filterRows(rows, filter = uiState.filter) {
        if (!hasActiveFilter(filter)) {
          return rows.map((row, index) => ({
            ...row,
            sourceIndex: index,
          }));
        }

        return rows
          .map((row, index) => {
            const matchedProblems = (row.testPaperProblems || []).filter(
              (item) => itemMatchesFilter(item, filter),
            );

            if (!matchedProblems.length) {
              return null;
            }

            return {
              ...row,
              testPaperProblems: matchedProblems,
              sourceIndex: index,
            };
          })
          .filter(Boolean);
      }

      function createCourseMapCard(entry, filter = uiState.filter) {
        const card = createElement("article", "course-map-card");
        const directJobSelections = getDirectJobSelectionSet(filter);
        const activeJobs = getActiveJobSelectionSet(filter);
        const isJobActive = activeJobs.has(entry.jobPosition);
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-pressed", isJobActive ? "true" : "false");

        const activateJobFilter = () => {
          const nextJobs = new Set(filter.jobPositions || []);
          const nextSkills = (filter.skills || []).filter(
            (skill) => skill.jobPosition !== entry.jobPosition,
          );

          if (isJobActive) {
            nextJobs.delete(entry.jobPosition);
          } else {
            nextJobs.add(entry.jobPosition);
          }

          setFilter({
            jobPositions: Array.from(nextJobs.values()),
            skills: nextSkills,
          });
        };

        card.addEventListener("click", activateJobFilter);
        card.addEventListener("keydown", (event) => {
          if (event.target !== card) {
            return;
          }

          if (event.key !== "Enter" && event.key !== " ") {
            return;
          }

          event.preventDefault();
          activateJobFilter();
        });

        if (isJobActive) {
          card.classList.add("is-active");
          card.append(
            createElement("span", "course-map-card-status", "已选中"),
          );
        }

        if (entry.industryPaths.length) {
          card.append(
            createElement(
              "p",
              "course-map-card-industry",
              entry.industryPaths.join(" · "),
            ),
          );
        }
        const heading = createElement("h3", "course-map-card-title");
        heading.append(
          createElement("span", "course-map-role-button", entry.jobPosition),
        );
        card.append(heading);

        const skills = createElement("div", "course-map-card-skills");
        entry.skills.forEach((skill) => {
          const button = createElement(
            "button",
            "course-map-skill",
            skill.name,
          );
          button.type = "button";
          const active = isSkillSelected(skill, entry.jobPosition, filter);
          if (active) {
            button.classList.add("is-active");
          }
          button.setAttribute("aria-pressed", active ? "true" : "false");
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const nextJobs = Array.from(directJobSelections.values());
            const skillSelections = new Map(
              (filter.skills || []).map((selectedSkill) => [
                getSelectedSkillKey(
                  selectedSkill.id,
                  selectedSkill.jobPosition,
                ),
                selectedSkill,
              ]),
            );
            const key = getSelectedSkillKey(skill.id, entry.jobPosition);
            if (active) {
              skillSelections.delete(key);
            } else {
              skillSelections.set(key, {
                id: String(skill.id),
                name: skill.name,
                jobPosition: entry.jobPosition,
              });
            }

            setFilter({
              jobPositions: nextJobs,
              skills: Array.from(skillSelections.values()),
            });
          });
          skills.append(button);
        });
        card.append(skills);

        return card;
      }

            isActive || isPartial ? "true" : "false",
          );

          button.addEventListener("click", () => {
            const selectedSkills = new Map(
              (filter.skills || []).map((selectedSkill) => [
                getSelectedSkillKey(
                  selectedSkill.id,
                  selectedSkill.jobPosition,
                ),
                selectedSkill,
              ]),
            );

            if (isActive) {
              getSkillOptionJobPositions(skill).forEach((jobPosition) => {
                selectedSkills.delete(
                  getSelectedSkillKey(skill.id, jobPosition),
                );
              });
            } else {
              getSkillOptionJobPositions(skill).forEach((jobPosition) => {
                selectedSkills.set(getSelectedSkillKey(skill.id, jobPosition), {
                  id: skill.id,
                  name: skill.name,
                  jobPosition,
                });
              });
            }

            setFilter({
              jobPositions: filter.jobPositions || [],
              skills: Array.from(selectedSkills.values()),
            });
          });

          list.append(button);
        });

        return list;
      }

      function getRowSkills(row) {
        const skills = (row.testPaperProblems || []).flatMap(
          (item) => item.skills || [],
        );
        return dedupeSkills(skills);
      }

      function createLaneSkillSummary(skills) {
        const summary = createElement("section", "lane-skills");

        const list = createElement("div", "lane-skill-list");
        if (!skills.length) {
          return "";
        }

        skills.forEach((skill) => {
          list.append(createElement("span", "lane-skill-chip", skill.name));
        });

        summary.append(list);
        return summary;
      }

      function createLaneEntry(row, index) {
        const entry = createElement("aside", "lane-entry");
        const rowSkills = getRowSkills(row);
        const displayIndex = (row.sourceIndex ?? index) + 1;

        const top = createElement("div", "lane-entry-top");

        top.append(createElement("h2", "lane-name", row.testPaper.name));
        top.append(createLaneSkillSummary(rowSkills));

        entry.append(top);
        return entry;
      }

      function createCluster(item, itemIndex, filter = uiState.filter) {
        const cluster = createElement("article", "item-cluster");
        cluster.setAttribute("tabindex", "0");
        cluster.setAttribute("role", "group");

        const header = createElement("header", "task-header");
        header.append(
          createElement(
            "h3",
            "task-title",
            `任务${itemIndex + 1}: ${getResourceTitle(item)}`,
          ),
        );
        cluster.append(header);

        const details = createElement("div", "task-detail-list");
        const { knowledgePoints, skillPoints } = getPointGroups(item);
        const skillEntries = dedupeSkills(item.skills || []).map((skill) => ({
          text: skill.name,
          active: isSkillHighlighted(skill, filter),
        }));
        const jobEntries = getItemJobEntries(item, filter);

        const detailNodes = [
          createTaskDetail(
            "知识点",
            knowledgePoints.map((point) => ({ text: point })),
            { numbered: true },
          ),
          createTaskDetail(
            "技能点",
            skillPoints.map((point) => ({ text: point })),
            { numbered: true },
          ),
          createTaskDetail("职业能力", skillEntries, {
            numbered: true,
          }),
          createTaskDetail("岗位", jobEntries, {
            numbered: true,
          }),
        ].filter(Boolean);

        if (detailNodes.length) {
          details.append(...detailNodes);
          cluster.append(details);
        }

        return cluster;
      }

      function renderLane(row, index, filter = uiState.filter) {
        const section = createElement("section", "lane");
        const shell = createElement("div", "lane-shell");
        const scroller = createElement("div", "lane-scroller");
        const laneTitle = `${row.testPaper.name} 任务区`;
        scroller.setAttribute("role", "region");
        scroller.setAttribute("aria-label", laneTitle);

        const track = createElement("div", "lane-track");
        const fragment = document.createDocumentFragment();

        row.testPaperProblems.forEach((item, itemIndex) => {
          fragment.append(createCluster(item, itemIndex, filter));
        });

        track.append(fragment);
        scroller.append(track);
        shell.append(createLaneEntry(row, index), scroller);
        section.append(shell);
        return section;
      }

      function renderRows(rows, filter = uiState.filter) {
        const main = createElement("main", "page-main");
        const visibleItemCount = rows.reduce(
          (sum, row) => sum + (row.testPaperProblems || []).length,
          0,
        );
        const copy = hasActiveFilter(filter)
          ? `当前匹配 ${rows.length} 个项目，展开 ${visibleItemCount} 个任务。`
          : "按项目查看任务、知识点和 skill 的对应关系。";
        const fragment = document.createDocumentFragment();

        if (!rows.length) {
          const empty = createElement("section", "page-main-empty");
          const message = hasActiveFilter(filter)
            ? "当前筛选下没有匹配的项目或任务。"
            : "当前课程暂无项目内容。";
          empty.append(createElement("p", "page-main-empty-copy", message));
          main.append(empty);
          return main;
        }

        rows.forEach((row, index) => {
          fragment.append(renderLane(row, index, filter));
        });

        main.append(fragment);
        return main;
      }

      function renderCurrentViewCard(visibleRows, filter = uiState.filter) {
        if (!hasActiveFilter(filter)) {
          return null;
        }

        const visibleMetrics = collectCourseMetrics(visibleRows);
        const filterDescription = getFilterDescription(filter);
        const currentCard = createElement(
          "section",
          "summary-card summary-card-current",
        );
        const currentHead = createPanelHead(
          "当前视图",
          "基于当前筛选查看课程匹配范围和项目分布。",
        );
        currentHead.classList.add("panel-head-inline");

        const resetButton = createElement(
          "button",
          "course-map-reset summary-reset",
          "清除筛选",
        );
        resetButton.type = "button";
        resetButton.addEventListener("click", clearFilter);
        currentHead.append(resetButton);
        currentCard.append(currentHead);
        currentCard.append(
          createElement(
            "p",
            "summary-copy",
            `当前筛选：${filterDescription}`,
          ),
        );

        const currentGrid = createElement(
          "div",
          "summary-grid current-view-grid",
        );
        currentGrid.append(
          createSummaryStat("匹配项目", visibleMetrics.unitCount),
        );
        currentGrid.append(
          createSummaryStat("匹配任务", visibleMetrics.itemCount),
        );
        currentGrid.append(
          createSummaryStat(
            "匹配知识点/技能点",
            visibleMetrics.knowledgePoints.length,
          ),
        );
        currentCard.append(currentGrid);

        return currentCard;
      }

      function renderCourseMap(
        rows,
        visibleRows = rows,
        filter = uiState.filter,
      ) {
        const section = createElement("section", "course-map");
        const currentCard = renderCurrentViewCard(visibleRows, filter);
        if (currentCard) {
          section.append(currentCard);
        }

        section.append(
          createPanelHead(
            "岗位列表",
            "点击岗位或能力，只过滤中间项目列表，帮助快速定位课程覆盖范围。",
          ),
        );

        const groups = collectCourseRoleMap(rows);
        if (!groups.length) {
          section.append(
            createElement(
              "p",
              "course-map-empty",
              "当前课程暂无岗位和技能映射",
            ),
          );
          return section;
        }

        const grid = createElement("div", "course-map-grid");
        groups.forEach((group) => {
          grid.append(createCourseMapCard(group, filter));
        });

        section.append(grid);
        return section;
      }

      function renderCourseSummary(
        course,
        allRows,
        filter = uiState.filter,
      ) {
        const section = createElement("aside", "page-summary");
        const totalMetrics = collectCourseMetrics(allRows);

        const detailCard = createElement("section", "summary-card");
        detailCard.append(
          createPanelHead(
            course.name,
            "聚合课程目标、规模和职业能力，便于快速理解课程结构。",
          ),
        );
        detailCard.append(
          createElement(
            "p",
            "summary-intro",
            course.summary || course.remark || "当前课程暂无总结。",
          ),
        );

        const overview = createElement("section", "summary-section");

        const overviewGrid = createElement("div", "summary-grid");
        overviewGrid.append(createSummaryStat("项目", totalMetrics.unitCount));
        overviewGrid.append(createSummaryStat("任务", totalMetrics.itemCount));
        overviewGrid.append(
          createSummaryStat(
            "知识点/技能点",
            totalMetrics.knowledgePoints.length,
          ),
        );
        overviewGrid.append(createSummaryStat("岗位", totalMetrics.roleCount));
        overview.append(overviewGrid);
        detailCard.append(overview);

        const skillsSection = createElement("section", "summary-section");
        skillsSection.append(
          createElement("h3", "summary-section-title", "职业能力"),
        );
        skillsSection.append(
          createSummarySkillTags(totalMetrics.skills.slice(0, 6), filter),
        );

        detailCard.append(skillsSection);

        section.append(detailCard);
        return section;
      }

      function renderSkillmap(source) {
        const app = document.getElementById("app");
        const fragment = document.createDocumentFragment();
        const filter = normalizeFilter(uiState.filter);
        const filteredRows = filterRows(source.rows, filter);
        const layout = createElement("div", "page-layout");
        layout.append(renderCourseMap(source.rows, filteredRows, filter));
        layout.append(renderRows(filteredRows, filter));
        layout.append(renderCourseSummary(source.course, source.rows, filter));
        fragment.append(layout);
        app.replaceChildren(fragment);
      }

      renderSkillmap(data);
    </script>
  </body>
</html>
