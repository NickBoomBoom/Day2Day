<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skillmap</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&family=Varela+Round&display=swap");
      * {
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #fffaf8;
        --panel: #ffffff;
        --panel-soft: #fff6f1;
        --ink: #1f2330;
        --muted: #7a8094;
        --line: #eadfd7;
        --line-strong: #efc7b1;
        --accent: rgb(250, 112, 46);
        --accent-deep: #b84b1a;
        --accent-soft: #fff1e8;
        --accent-softer: #fff8f4;
        --accent-ring: rgba(250, 112, 46, 0.14);
        --shadow: 0 18px 40px -36px rgba(31, 35, 48, 0.28);
        --radius: 8px;
        --body-font:
          "Nunito Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        --display-font:
          "Varela Round", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      html {
        color-scheme: light;
        font-family: var(--body-font);
        color: var(--ink);
      }

      body {
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
        background:
          radial-gradient(
            circle at 12% 10%,
            rgba(132, 193, 255, 0.22),
            transparent 24%
          ),
          radial-gradient(
            circle at 88% 10%,
            rgba(250, 196, 126, 0.22),
            transparent 22%
          ),
          linear-gradient(180deg, #fbfefd 0%, #fffaf4 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 16% -8% auto -8%;
        height: 44vh;
        pointer-events: none;
        opacity: 0.42;
        background:
          radial-gradient(
            circle at 20% 50%,
            rgba(115, 177, 255, 0.08),
            transparent 32%
          ),
          radial-gradient(
            circle at 80% 44%,
            rgba(247, 178, 92, 0.08),
            transparent 28%
          ),
          repeating-radial-gradient(
            circle at 50% 50%,
            rgba(133, 165, 216, 0.12) 0 1px,
            transparent 1px 11px
          );
        mask: linear-gradient(
          180deg,
          transparent 0%,
          #000 18%,
          #000 82%,
          transparent 100%
        );
        z-index: -1;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      #app {
        width: 1600px;
        margin: 0 auto;
        padding: clamp(18px, 2vw, 28px);
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: 0 16px 36px -34px rgba(31, 35, 48, 0.24);
      }

      .boot-state,
      .boot-error {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 20px);
        padding: 24px;
        text-align: center;
      }

      .boot-state p,
      .boot-error p {
        max-width: 520px;
        font-size: 14px;
        line-height: 1.7;
        color: var(--muted);
      }

      .skillmap-page {
        position: relative;
        display: grid;
        gap: clamp(34px, 4vw, 56px);
        padding-bottom: 42px;
      }

      .hero-scene {
        position: relative;
        display: grid;
        gap: 28px;
        justify-items: center;
        padding-top: 8px;
      }

      .hero-copy {
        display: grid;
        gap: 10px;
        justify-items: center;
        text-align: center;
      }

      .hero-kicker {
        font-size: 13px;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #57758f;
      }

      .hero-title {
        font-family: var(--display-font);
        font-size: 32px;
        line-height: 1.06;
        letter-spacing: -0.05em;
        color: #121a2b;
        text-align: center;
      }

      .hero-summary {
        max-width: 960px;
        font-size: 14px;
        line-height: 1.8;
        color: #5d6a80;
        text-align: center;
      }

      .overview-stage {
        position: relative;
        width: min(100%, 980px);
        padding: 26px 26px 30px;
        border: 1px solid rgba(226, 216, 205, 0.92);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 60px -46px rgba(31, 35, 48, 0.34);
        backdrop-filter: blur(12px);
      }

      .overview-stage::before,
      .overview-stage::after {
        content: "";
        position: absolute;
        top: 34px;
        width: 84px;
        height: 164px;
        border-radius: 999px;
        opacity: 0.68;
        pointer-events: none;
      }

      .overview-stage::before {
        left: -118px;
        background:
          linear-gradient(180deg, rgba(96, 166, 247, 0.22), transparent 80%),
          radial-gradient(
            circle at 50% 100%,
            rgba(92, 146, 255, 0.28),
            transparent 48%
          );
      }

      .overview-stage::after {
        right: -118px;
        background:
          linear-gradient(180deg, rgba(253, 191, 94, 0.22), transparent 80%),
          radial-gradient(
            circle at 50% 100%,
            rgba(253, 174, 72, 0.28),
            transparent 48%
          );
      }

      .overview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .overview-column.role-column {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .overview-column.role-column .overview-item {
        flex: 1;
      }

      .overview-column.role-column > h2 {
        margin-bottom: 4px;
      }

      .overview-column.skill-column {
        display: grid;
        grid-template-rows: auto auto;
        gap: 14px;
      }

      .overview-heading {
        height: 44px;
        line-height: 44px;
        text-align: center;
        border-radius: 12px;
        color: #fff;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.02em;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
      }

      .overview-heading.role {
        background: linear-gradient(135deg, #294e95 0%, #1e6bc2 100%);
      }

      .overview-heading.skill {
        background: linear-gradient(135deg, #12836f 0%, #26a77a 100%);
      }

      .overview-list {
        display: grid;
        gap: 10px;
        list-style: none;
      }

      .overview-column.skill-column .overview-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .overview-column.skill-column .overview-item {
        padding: 10px 12px;
      }

      .overview-column.skill-column .overview-item-text {
        font-size: 16px;
        line-height: 1.3;
      }

      .overview-item {
        --tone-bg: #eef4ff;
        --tone-border: #d1dfff;
        --tone-accent: #3f6dbf;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        min-height: 54px;
        padding: 10px 14px;
        border: 1px solid var(--tone-border);
        border-radius: 14px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.72),
            rgba(255, 255, 255, 0.48)
          ),
          var(--tone-bg);
      }

      .overview-item-badge {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: color-mix(in srgb, var(--tone-accent) 14%, white);
        color: var(--tone-accent);
        font-size: 13px;
        line-height: 1;
        font-weight: 800;
      }

      .overview-item-text {
        font-size: 18px;
        line-height: 1.35;
        font-weight: 800;
        color: #1e2435;
        word-break: break-word;
      }

      .flow-section {
        display: grid;
        gap: 26px;
      }

      .flow-title {
        font-family: var(--display-font);
        font-size: clamp(28px, 3vw, 44px);
        line-height: 1.08;
        text-align: center;
        color: #172136;
      }

      .flow-shell {
        display: grid;
        gap: 64px;
      }

      .flow-row {
        position: relative;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 30px;
        align-items: start;
      }

      .flow-row::before {
        content: "";
        position: absolute;
        left: 8%;
        right: 8%;
        top: 58px;
        height: 3px;
        background: linear-gradient(
          90deg,
          rgba(120, 166, 217, 0.55) 0%,
          rgba(120, 166, 217, 0.55) 33%,
          rgba(244, 184, 88, 0.55) 66%,
          rgba(244, 184, 88, 0.55) 100%
        );
        z-index: 0;
      }

      .row-turn {
        --turn-color: #b76517;
        position: absolute;
        top: 58px;
        bottom: -56px;
        width: 80px;
        pointer-events: none;
        z-index: 0;
        color: var(--turn-color);
      }

      .row-turn::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 14px;
        width: 72px;
        border-top: 4px solid color-mix(in srgb, var(--turn-color) 82%, white);
        border-bottom: 4px solid
          color-mix(in srgb, var(--turn-color) 82%, white);
        box-shadow: 0 16px 24px -24px rgba(183, 101, 23, 0.42);
      }

      .row-turn-arrow {
        position: absolute;
        bottom: 4px;
        width: 0;
        height: 0;
        z-index: 1;
      }

      .row-turn.is-right {
        right: -72px;
      }

      .row-turn.is-right::before {
        left: 0;
        border-right: 4px solid color-mix(in srgb, var(--turn-color) 82%, white);
        border-top-right-radius: 36px;
        border-bottom-right-radius: 36px;
      }

      .row-turn.is-right .row-turn-arrow {
        left: -1px;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-right: 14px solid
          color-mix(in srgb, var(--turn-color) 86%, white);
        filter: drop-shadow(0 8px 10px rgba(183, 101, 23, 0.24));
      }

      .row-turn.is-left {
        left: -72px;
      }

      .row-turn.is-left::before {
        right: 0;
        border-left: 4px solid color-mix(in srgb, var(--turn-color) 82%, white);
        border-top-left-radius: 36px;
        border-bottom-left-radius: 36px;
      }

      .row-turn.is-left .row-turn-arrow {
        right: -1px;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-left: 14px solid
          color-mix(in srgb, var(--turn-color) 86%, white);
        filter: drop-shadow(0 8px 10px rgba(183, 101, 23, 0.24));
      }

      .flow-stage {
        --stage-surface: #edf3ff;
        --stage-border: #bed1ff;
        --stage-accent: #4675d8;
        position: relative;
        display: grid;
        gap: 20px;
        z-index: 1;
        min-width: 0;
      }

      .flow-stage::after {
        content: "→";
        position: absolute;
        top: 38px;
        right: -18px;
        color: var(--stage-accent);
        font-size: 28px;
        line-height: 1;
        font-weight: 700;
      }

      .flow-stage:last-child::after {
        display: none;
      }

      .flow-row.is-reverse .flow-stage::after {
        display: none;
      }

      .flow-row.is-reverse .flow-stage::before {
        content: "←";
        position: absolute;
        top: 38px;
        left: -18px;
        color: var(--stage-accent);
        font-size: 28px;
        line-height: 1;
        font-weight: 700;
      }

      .flow-row.is-reverse .flow-stage:first-child::before {
        display: none;
      }

      .project-node {
        min-height: 116px;
        display: grid;
        align-content: center;
        gap: 8px;
        padding: 22px 18px;
        border: 1px solid var(--stage-border);
        border-radius: 20px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.78),
            rgba(255, 255, 255, 0.56)
          ),
          var(--stage-surface);
        box-shadow: 0 18px 42px -38px
          color-mix(in srgb, var(--stage-accent) 30%, white);
        text-align: center;
        min-width: 0;
      }

      .project-order {
        font-size: 14px;
        line-height: 1.2;
        font-weight: 800;
        color: var(--stage-accent);
      }

      .project-name {
        font-family: var(--display-font);
        font-size: 21px;
        line-height: 1.16;
        color: #1a2336;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .task-tree {
        position: relative;
        display: grid;
        gap: 14px;
        width: 100%;
        max-width: 340px;
        justify-self: center;
        padding-top: 18px;
        list-style: none;
        min-width: 0;
      }

      .task-tree::before {
        content: "";
        position: absolute;
        top: 0;
        left: 22px;
        width: 2px;
        height: 18px;
        background: color-mix(in srgb, var(--stage-accent) 35%, white);
      }

      .task-node {
        position: relative;
        display: flex;
        align-items: center;
      }

      .task-node::before {
        content: "";
        position: absolute;
        left: 22px;
        top: -14px;
        width: 2px;
        height: 14px;
        background: color-mix(in srgb, var(--stage-accent) 24%, white);
      }

      .task-node:first-child::before {
        display: none;
      }

      .task-badge {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border-radius: 999px;
        background: color-mix(in srgb, var(--stage-accent) 14%, white);
        border: 1px solid color-mix(in srgb, var(--stage-accent) 20%, white);
        color: var(--stage-accent);
        font-size: 14px;
        line-height: 1;
        margin-right: 8px;
        font-weight: 800;
      }

      .task-content {
        display: grid;
        align-content: center;
        min-width: 0;
      }

      .task-text {
        font-size: 16px;
        line-height: 1.2;
        font-weight: 700;
        color: #222c40;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .empty-state {
        min-height: 220px;
        display: grid;
        place-items: center;
        padding: 24px;
        border: 1px dashed rgba(90, 111, 141, 0.22);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        text-align: center;
        font-size: 15px;
        line-height: 1.8;
        color: var(--muted);
      }
    </style>
  </head>

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderBootError(message) {
        appRoot.innerHTML = `

          </div>
        `;

      function buildOverviewModel(source = {}) {
        const jobTones = [
          { bg: "#e9f1ff", border: "#c8d8ff", accent: "#2f62b7" },
          { bg: "#edf6ff", border: "#cfe2ff", accent: "#275f9b" },
          { bg: "#e8f7f2", border: "#c8eadf", accent: "#23886f" },
          { bg: "#edf8f4", border: "#d0ece2", accent: "#2f8f79" },
          { bg: "#fff0df", border: "#f5d5a8", accent: "#c27a22" },
          { bg: "#fff4e8", border: "#f2ddbf", accent: "#d0862c" },
        ];
        const skillTones = [
          { bg: "#e7f8f3", border: "#bfe7db", accent: "#167e68" },
          { bg: "#f0fbf4", border: "#c8ecd4", accent: "#2f9156" },
          { bg: "#eefbf9", border: "#cce9e5", accent: "#2b8c87" },
          { bg: "#eef3ff", border: "#d5ddff", accent: "#4b62c6" },
          { bg: "#fff6e8", border: "#f3dfb8", accent: "#bf8430" },
          { bg: "#fff1e4", border: "#f3d3b2", accent: "#c46a2d" },
        ];

        const decorate = (items = [], tones = []) =>
          items.map((name, index) => {
            const tone = tones[index % tones.length];
            return {
              key: `${index + 1}-${name}`,
              badge: index + 1,
              name,
              style: {
                "--tone-bg": tone.bg,
                "--tone-border": tone.border,
                "--tone-accent": tone.accent,
              },
            };
          });

        const jobs = Array.isArray(source.jobs) ? source.jobs : [];
        const abilityList = [];
        const seenAbilities = new Set();

        jobs.forEach((job) => {
          (Array.isArray(job?.skills) ? job.skills : []).forEach((skill) => {
            const normalizedSkill = skill || "未命名职业能力";
            if (seenAbilities.has(normalizedSkill)) {
              return;
            }
            seenAbilities.add(normalizedSkill);
            abilityList.push(normalizedSkill);
          });
        });

        return {
          jobs: decorate(
            jobs.map((job) => job?.name || "未命名岗位"),
            jobTones,
          ),
          skills: decorate(abilityList, skillTones),
        };
      }

      function buildProjectFlowModel(projects = []) {
        const tones = [
          {
            surface: "#e8f0ff",
            border: "#bfd0ff",
            accent: "#4a74d6",
          },
          {
            surface: "#e8f8f1",
            border: "#bfe8d7",
            accent: "#2d9d77",
          },
          {
            surface: "#fff4e3",
            border: "#f5d7a9",
            accent: "#d49334",
          },
          {
            surface: "#fff1e8",
            border: "#f0cfba",
            accent: "#d97a47",
          },
        ];

        const projectCards = projects.map((project, projectIndex) => {
          const tone = tones[projectIndex % tones.length];
          const rawName = project?.name || `项目${projectIndex + 1}`;
          const shortName =
            rawName.replace(/^项目\d+\s*/u, "").trim() || rawName;

          return {
            key: `${projectIndex + 1}-${rawName}`,
            order: projectIndex + 1,
            name: shortName,
            fullName: rawName,
            style: {
              "--stage-surface": tone.surface,
              "--stage-border": tone.border,
              "--stage-accent": tone.accent,
            },
            tasks: (project.tasks || []).map((task, taskIndex) => ({
              key: `${projectIndex + 1}-${taskIndex + 1}-${task || "任务"}`,
              order: taskIndex + 1,
              name: task || `任务${taskIndex + 1}`,
            })),
          };
        });

        const rows = [];
        for (let index = 0; index < projectCards.length; index += 4) {
          const rowIndex = rows.length;
          const slice = projectCards.slice(index, index + 4);
          const isReverse = rowIndex % 2 === 1;
          rows.push({
            key: `flow-row-${rowIndex + 1}`,
            isReverse,
            hasTurn: index + 4 < projectCards.length,
            projects: isReverse ? [...slice].reverse() : slice,
          });
        }

        return {
          projects: projectCards,
          rows,
        };
      }

      async function bootstrap() {
        try {
          const { createApp } =
            await import("https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.prod.js");

          createApp({
            setup() {
              const courseData = data || {};
              const overviewModel = buildOverviewModel(courseData);
              const projectFlowModel = buildProjectFlowModel(
                courseData.project || [],
              );

              return {
                courseData,
                overviewModel,
                projectFlowModel,
              };
            },
            template: `
              <div class="skillmap-page">
                <header class="hero-scene">
                  <div class="hero-copy">
                    <h1 class="hero-title">《{{ courseData.title || '课程名称' }}》</h1>
                    <p class="hero-summary">{{ courseData.summary }}</p>
                  </div>

                  <section class="overview-stage">
                    <div class="overview-grid">
                      <article class="overview-column role-column">
                        <h2 class="overview-heading role">匹配岗位示例</h2>
                          <div
                            v-for="job in overviewModel.jobs"
                            :key="job.key"
                            class="overview-item"
                            :style="job.style"
                          >
                            <span class="overview-item-badge">{{ job.badge }}</span>
                            <span class="overview-item-text">{{ job.name }}</span>
                          </div>
                      </article>

                      <article class="overview-column skill-column">
                        <h2 class="overview-heading skill">核心职业能力方向</h2>
                        <ol v-if="overviewModel.skills.length" class="overview-list">
                          <li
                            v-for="skill in overviewModel.skills"
                            :key="skill.key"
                            class="overview-item"
                            :style="skill.style"
                          >
                            <span class="overview-item-badge">{{ skill.badge }}</span>
                            <span class="overview-item-text">{{ skill.name }}</span>
                          </li>
                        </ol>
                        <p v-else class="empty-state">当前课程暂无职业能力数据。</p>
                      </article>
                    </div>
                  </section>
                </header>

                <section class="flow-section">
                  <h2 class="flow-title">课程实训项目全景</h2>
                  <div v-if="!projectFlowModel.projects.length" class="empty-state">
                    当前课程暂无项目数据。
                  </div>
                  <div v-else class="flow-shell">
                    <div
                      v-for="row in projectFlowModel.rows"
                      :key="row.key"
                      class="flow-row"
                      :class="{ 'is-reverse': row.isReverse }"
                    >
                      <article
                        v-for="project in row.projects"
                        :key="project.key"
                        class="flow-stage"
                        :style="project.style"
                      >
                        <div class="project-node">
                          <p class="project-order">项目{{ project.order }}</p>
                          <h3 class="project-name">{{ project.name }}</h3>
                        </div>
                        <ol class="task-tree">
                          <li
                            v-for="task in project.tasks"
                            :key="task.key"
                            class="task-node"
                          >
                            <span class="task-badge">{{ task.order }}</span>
                            <div class="task-content">
                              <p class="task-text">{{ task.name }}</p>
                            </div>
                          </li>
                        </ol>
                      </article>
                      <div
                        v-if="row.hasTurn"
                        class="row-turn"
                        :class="row.isReverse ? 'is-left' : 'is-right'"
                      >
                        <span class="row-turn-arrow" aria-hidden="true"></span>
                      </div>
                    </div>
                  </div>
                </section>
              </div>
            `,
          }).mount(appRoot);
        } catch (error) {
          console.error("Skillmap bootstrap failed", error);
          renderBootError(
            "课程图谱模块加载失败。请确认当前网络可以访问 Vue 3 CDN，然后刷新页面重试。",
          );
        }
      }

      bootstrap();
    </script>
  </body>
</html>
