<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>课程图谱</title>
    <script src="https://unpkg.com/@antv/infographic@0.2.16/dist/infographic.min.js"></script>
    <style>
      body {
        margin: 0;
        min-width: 1280px;
        background: #f6f8fb;
        color: #1f2937;
        font-family:
          "Alibaba PuHuiTi", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .page {
        padding: 32px;
      }

      .hero {
        margin-bottom: 24px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.2;
      }

      .hero p {
        margin: 0;
        max-width: 1120px;
        color: #4b5563;
        font-size: 15px;
        line-height: 1.7;
      }

      .panel {
        margin-bottom: 24px;
        padding: 20px;
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 16px;
      }

      .panel h2 {
        margin: 0 0 16px;
        font-size: 20px;
        line-height: 1.3;
      }

      .chart {
        width: 100%;
        background: #ffffff;
        border-radius: 12px;
      }

      #jobs-container {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
        background: transparent;
        border-radius: 0;
      }

      .job-card {
        padding: 16px;
        background: #ffffff;
        border: 1px solid #dbe3ef;
        border-radius: 12px;
      }

      .job-card-header {
        margin: 0 0 12px;
        font-size: 18px;
        line-height: 1.4;
      }

      .job-card-chart {
        height: 420px;
        background: #ffffff;
        border-radius: 10px;
      }

      .job-card-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 420px;
        color: #6b7280;
        font-size: 15px;
        line-height: 1.6;
        background: #f8fafc;
        border: 1px dashed #dbe3ef;
        border-radius: 10px;
      }

      .job-status {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 180px;
        padding: 24px;
        grid-column: 1 / -1;
        color: #4b5563;
        font-size: 15px;
        line-height: 1.7;
        background: #ffffff;
        border: 1px dashed #dbe3ef;
        border-radius: 12px;
      }

      .job-probe {
        position: fixed;
        left: -9999px;
        top: -9999px;
        width: 360px;
        height: 360px;
        opacity: 0;
        pointer-events: none;
        overflow: hidden;
      }

      #projects-container {
        min-height: 2800px;
      }
    </style>
  </head>
  <body>

        <h1 id="page-title"></h1>

      </header>

      </section>

      <section class="panel">

        <div id="projects-container" class="chart"></div>
      </section>
    </main>

      const ICON_ENDPOINT = "https://www.weavefox.cn/api/open/v1/icon";
      const JOB_TEMPLATE_UNDERLINE = "sequence-circular-underline-text";
      const JOB_TEMPLATE_ICON = "sequence-circular-simple";
      const ICON_HREF_ATTRIBUTE = "http://www.w3.org/1999/xlink";
      const SVG_NS = "http://www.w3.org/2000/svg";

      function createTreeNode(label, children) {
        return {
          label,
          children: Array.isArray(children) ? children : [],
        };
      }

      function quoteSyntaxText(value) {
        return JSON.stringify(String(value || ""));
      }

      function buildJobSequenceData(job, iconMap) {
        const skills = Array.isArray(job && job.skills) ? job.skills : [];
        return skills.map((skill, index) => {
          const sequence = {
            label: skill || "未命名职业能力",
            desc: "职业能力",
            value: index + 1,
          };

          const icon = iconMap instanceof Map ? iconMap.get(skill) : "";
          if (icon) {
            sequence.icon = icon;
          }

          return sequence;
        });
      }

      function buildJobSequenceSyntax(job, iconMap, templateName) {
        const sequences = buildJobSequenceData(job, iconMap);
        const lines = [
          `infographic ${templateName || JOB_TEMPLATE_UNDERLINE}`,
          "data",
          `  title ${quoteSyntaxText(job && job.name ? job.name : "未命名岗位")}`,
          `  desc ${quoteSyntaxText("对应职业能力")}`,
          "  sequences",
        ];

        sequences.forEach((sequence) => {
          lines.push(`    - label ${quoteSyntaxText(sequence.label)}`);
          lines.push(`      desc ${quoteSyntaxText(sequence.desc)}`);
          lines.push(`      value ${sequence.value}`);
          if (sequence.icon) {
            lines.push(`      icon ${quoteSyntaxText(sequence.icon)}`);
          }
        });

        lines.push("theme light");
        lines.push("  palette antv");

        return lines.join("\n");
      }

      function buildJobSequenceOptions(job, iconMap) {
        return {
          design: {
            title: "default",
            structure: {
              type: "sequence-circular",
            },
            items: [
              {
                type: "simple",
                showIcon: true,
                usePaletteColor: true,
              },
            ],
          },
          themeConfig: {
            colorPrimary: "#1783ff",
          },
          data: {
            title: job && job.name ? job.name : "未命名岗位",
            desc: "对应职业能力",
            sequences: buildJobSequenceData(job, iconMap),
          },
        };
      }

      function buildProjectTreeData(source) {
        return {
          title: "项目与任务",
          desc: "按项目查看任务拆解。",
          root: createTreeNode(
            "项目总览",
            (source.project || []).map((project) =>
              createTreeNode(
                project.name || "未命名项目",
                (project.tasks || []).map((task) =>
                  createTreeNode(task || "未命名任务"),
                ),
              ),
            ),
          ),
        };
      }

      function renderError(container, error) {
        const list = Array.isArray(error) ? error : [error];
        const message = list
          .map((item) => {
            if (item && typeof item === "object") {
              return item.message || JSON.stringify(item);
            }
            return String(item || "未知错误");
          })
          .join("\n");

        container.innerHTML =
          '<pre style="margin:0;padding:16px;font:14px/1.6 monospace;white-space:pre-wrap;">' +
          "Infographic 渲染失败：\n" +
          message.replace(/[&<>]/g, (char) => {
            return {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
            }[char];
          }) +
          "</pre>";
      }

      function renderChart(container, optionsOrSyntax) {
        const { Infographic } = window.AntVInfographic;
        const isSyntax = typeof optionsOrSyntax === "string";
        container.innerHTML = "";
        const infographic = new Infographic(
          isSyntax
            ? {
                container,
                width: container.clientWidth || 560,
                height: container.clientHeight || 420,
              }
            : {
                container,
                width: container.clientWidth || 560,
                height: container.clientHeight || 420,
                ...optionsOrSyntax,
              },
        );

        infographic.on("error", (error) => {
          renderError(container, error);
        });

        try {
          infographic.render(isSyntax ? optionsOrSyntax : undefined);
        } catch (error) {
          renderError(container, error);
        }

        return infographic;
      }

      function wait(ms) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, ms);
        });
      }

      function showJobsStatus(container, message) {
        container.innerHTML = `<div class="job-status">${message}</div>`;
      }

      function createSvgImageFromUse(useNode, iconUrl) {
        const imageNode = document.createElementNS(SVG_NS, "image");
        const attributesToCopy = [
          "x",
          "y",
          "width",
          "height",
          "data-element-type",
          "data-indexes",
          "style",
          "transform",
          "opacity",
        ];

        attributesToCopy.forEach((attribute) => {
          const value = useNode.getAttribute(attribute);
          if (value !== null && value !== "") {
            imageNode.setAttribute(attribute, value);
          }
        });

        imageNode.setAttribute("href", iconUrl);
        imageNode.setAttributeNS(ICON_HREF_ATTRIBUTE, "href", iconUrl);
        imageNode.setAttribute("preserveAspectRatio", "xMidYMid meet");

        return imageNode;
      }

      function patchJobCardIcons(chart, job, iconMap) {
        const skills = Array.isArray(job && job.skills) ? job.skills : [];
        if (!skills.length || !(iconMap instanceof Map) || !iconMap.size) {
          return;
        }

        const iconNodes = Array.from(
          chart.querySelectorAll('[data-element-type="item-icon"][data-indexes]'),
        );

        iconNodes.forEach((node) => {
          const rawIndexes = node.getAttribute("data-indexes") || "";
          const itemIndex = Number(String(rawIndexes).split(",")[0]);
          if (!Number.isInteger(itemIndex) || itemIndex < 0) {
            return;
          }

          const skill = skills[itemIndex];
          const iconUrl = skill ? iconMap.get(skill) : "";
          if (!iconUrl) {
            return;
          }

          node.replaceWith(createSvgImageFromUse(node, iconUrl));
        });
      }

      function schedulePatchJobCardIcons(chart, job, iconMap) {
        const runPatch = () => {
          patchJobCardIcons(chart, job, iconMap);
        };

        window.requestAnimationFrame(runPatch);
        window.setTimeout(runPatch, 180);
        window.setTimeout(runPatch, 520);
      }

      async function fetchSkillIcon(skill) {
        const response = await fetch(
          `${ICON_ENDPOINT}?text=${encodeURIComponent(skill)}&topK=1`,
        );
        if (!response.ok) {
          throw new Error(`图标接口请求失败：${response.status}`);
        }

        const payload = await response.json();
        const icon =
          payload && payload.data && payload.data.data && payload.data.data[0];
        return typeof icon === "string" ? icon : "";
      }

      async function loadSkillIcons(jobs) {
        const uniqueSkills = [];
        const seenSkills = new Set();
        (jobs || []).forEach((job) => {
          (job && job.skills ? job.skills : []).forEach((skill) => {
            if (!skill || seenSkills.has(skill)) {
              return;
            }

            seenSkills.add(skill);
            uniqueSkills.push(skill);
          });
        });

        const iconMap = new Map();

        await Promise.allSettled(
          uniqueSkills.map(async (skill) => {
            const icon = await fetchSkillIcon(skill);
            if (!icon) {
              return;
            }

            iconMap.set(skill, icon);
          }),
        );

        return iconMap;
      }

      async function detectJobTemplate(iconMap) {
        const firstIconEntry = Array.from(iconMap.entries())[0];
        if (!firstIconEntry) {
          return JOB_TEMPLATE_UNDERLINE;
        }

        const [skill, iconUrl] = firstIconEntry;
        const probe = document.createElement("div");
        probe.className = "job-probe";
        document.body.appendChild(probe);

        try {
          renderChart(
            probe,
            buildJobSequenceSyntax(
              {
                name: "图标探针",
                skills: [skill],
              },
              iconMap,
              JOB_TEMPLATE_UNDERLINE,
            ),
          );

          await wait(240);

          const hasImage = Array.from(probe.querySelectorAll("image")).some(
            (imageNode) => {
              return (
                imageNode.getAttribute("href") === iconUrl ||
                imageNode.getAttributeNS(ICON_HREF_ATTRIBUTE, "href") ===
                  iconUrl
              );
            },
          );

          return hasImage ? JOB_TEMPLATE_UNDERLINE : JOB_TEMPLATE_ICON;
        } catch (error) {
          return JOB_TEMPLATE_ICON;
        } finally {
          probe.remove();
        }
      }

      function renderJobCards(container, jobs, iconMap, templateName) {
        container.innerHTML = "";

        (jobs || []).forEach((job) => {
          const card = document.createElement("article");
          card.className = "job-card";

          const heading = document.createElement("h3");
          heading.className = "job-card-header";
          heading.textContent = job && job.name ? job.name : "未命名岗位";
          card.appendChild(heading);

          const skills = Array.isArray(job && job.skills) ? job.skills : [];
          if (!skills.length) {
            const empty = document.createElement("div");
            empty.className = "job-card-empty";
            empty.textContent = "暂无职业能力";
            card.appendChild(empty);
            container.appendChild(card);
            return;
          }

          const chart = document.createElement("div");
          chart.className = "job-card-chart";
          card.appendChild(chart);
          container.appendChild(card);

          if (templateName === JOB_TEMPLATE_UNDERLINE) {
            renderChart(
              chart,
              buildJobSequenceSyntax(job, iconMap, templateName),
            );
            schedulePatchJobCardIcons(chart, job, iconMap);
            return;
          }

          renderChart(chart, buildJobSequenceOptions(job, iconMap));
          schedulePatchJobCardIcons(chart, job, iconMap);
        });
      }

      async function render() {
        document.getElementById("page-title").textContent =
          data.title || "课程图谱";
        document.getElementById("page-summary").textContent =
          data.summary || "";

        const jobsContainer = document.getElementById("jobs-container");
        const projectsContainer = document.getElementById("projects-container");

        if (!window.AntVInfographic || !window.AntVInfographic.Infographic) {
          jobsContainer.textContent = "Infographic 脚本加载失败。";
          projectsContainer.textContent = "Infographic 脚本加载失败。";
          return;
        }

        const projectsHeight = Math.max(
          2800,
          ((data.project || []).length + 1) * 120,
        );

        projectsContainer.style.height = `${projectsHeight}px`;
        showJobsStatus(jobsContainer, "正在匹配职业能力图标...");

        renderChart(projectsContainer, {
          container: projectsContainer,
          width: projectsContainer.clientWidth || 1200,
          height: projectsHeight,
          design: {
            title: "default",
            structure: {
              type: "hierarchy-tree",
              orientation: "left-right",
              edgeType: "straight",
              edgeColorMode: "gradient",
              edgeMarker: "arrow",
              colorMode: "branch",
              levelGap: 170,
              nodeGap: 48,
            },
            item: {
              type: "compact-card",
              width: 220,
              height: 72,
            },
          },
          themeConfig: {
            colorPrimary: "#f0884d",
          },
          data: buildProjectTreeData(data),
        });

        try {
          const iconMap = await loadSkillIcons(data.jobs);
          const templateName = await detectJobTemplate(iconMap);
          renderJobCards(jobsContainer, data.jobs, iconMap, templateName);
        } catch (error) {
          renderJobCards(
            jobsContainer,
            data.jobs,
            new Map(),
            JOB_TEMPLATE_UNDERLINE,
          );
        }
      }

      render();
    </script>
  </body>
</html>
